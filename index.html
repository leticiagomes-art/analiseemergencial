<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Consolidado</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050507;
  --bg1: #0a0a0f;
  --bg2: #111118;
  --bg3: #18181f;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.10);
  --text: #e2e2e8;
  --text2: #888899;
  --text3: #55556a;
  --blue: #4d9fff;
  --blue-dim: rgba(77,159,255,0.12);
  --green: #3dd68c;
  --green-dim: rgba(61,214,140,0.10);
  --red: #ff5f5f;
  --red-dim: rgba(255,95,95,0.10);
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.10);
  --purple: #a78bfa;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Syne', sans-serif;
}

body {
  background: var(--bg);
  font-family: var(--sans);
  color: var(--text);
  min-height: 100vh;
  padding: 0;
}

/* ── HEADER ── */
.header {
  border-bottom: 1px solid var(--border);
  padding: 20px 28px 0;
  background: var(--bg1);
  position: sticky; top: 0; z-index: 100;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.logo {
  font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--text3); font-family: var(--mono);
}
.date-badge {
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  background: var(--bg3); border: 1px solid var(--border); border-radius: 4px;
  padding: 3px 10px;
}

/* main tabs */
.main-tabs { display: flex; gap: 0; }
.main-tab {
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  padding: 10px 22px; cursor: pointer; border: none; background: transparent;
  color: var(--text3); position: relative; transition: color .2s;
  border-top-left-radius: 6px; border-top-right-radius: 6px;
  letter-spacing: .01em;
}
.main-tab::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px;
  background: transparent; transition: background .2s;
}
.main-tab.active { color: var(--text); }
.main-tab.active::after { background: var(--blue); }
.main-tab:hover:not(.active) { color: var(--text2); }

/* ── CONTENT ── */
.content { padding: 24px 28px; }
.main-panel { display: none; }
.main-panel.active { display: block; }

/* sub-tabs */
.sub-tabs {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px;
}
.sub-btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: .04em; text-transform: uppercase;
  padding: 6px 16px; border: 1px solid var(--border2); border-radius: 4px;
  background: transparent; color: var(--text3); cursor: pointer; transition: all .18s;
}
.sub-btn.active {
  background: var(--blue-dim); border-color: var(--blue); color: var(--blue);
}
.sub-btn:hover:not(.active) { border-color: var(--border2); color: var(--text2); }

/* sub-panels */
.sub-panel { display: none; }
.sub-panel.active { display: block; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* ── METRICS ── */
.metrics-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;
  margin-bottom: 14px;
}
.metric {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px;
}
.metric-label { font-size: 11px; color: var(--text3); font-family: var(--mono); letter-spacing: .04em; margin-bottom: 6px; }
.metric-val { font-size: 20px; font-weight: 700; color: var(--text); font-family: var(--mono); line-height: 1; }
.metric-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 5px; }
.metric-val.good { color: var(--green); }
.metric-val.warn { color: var(--red); }
.metric-val.info { color: var(--blue); }
.metric-val.amber { color: var(--amber); }

/* section title */
.sec-title {
  font-size: 10px; font-family: var(--mono); letter-spacing: .1em; text-transform: uppercase;
  color: var(--text3); margin: 22px 0 12px; padding-left: 2px;
  border-left: 2px solid var(--blue); padding-left: 8px;
}

/* ── BAR ROWS ── */
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.bar-label { font-size: 11px; font-family: var(--mono); color: var(--text2); min-width: 42px; text-align: right; }
.bar-bg { flex: 1; background: var(--bg3); border-radius: 3px; height: 22px; overflow: hidden; }
.bar-fill {
  height: 100%; border-radius: 3px; display: flex; align-items: center;
  justify-content: flex-end; padding-right: 8px;
  font-size: 11px; font-weight: 500; font-family: var(--mono); color: #fff;
  transition: width .5s cubic-bezier(.25,.46,.45,.94);
}
.bar-val { font-size: 11px; font-family: var(--mono); color: var(--text3); min-width: 80px; }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { border-bottom: 1px solid var(--border2); }
th { padding: 10px 14px; text-align: left; font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); }
td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 12px; color: var(--text2); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }
td.num { color: var(--text); font-weight: 500; }
td.good { color: var(--green); }
td.warn { color: var(--red); }
td.amber { color: var(--amber); }
td.info { color: var(--blue); }

/* ── CHART CONTAINERS ── */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
@media (max-width: 700px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px 18px;
}
.chart-title {
  font-size: 11px; font-family: var(--mono); letter-spacing: .07em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 14px;
}
.chart-full { margin-top: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; }
.legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-family: var(--mono); color: var(--text3); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* divider */
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* tag */
.tag {
  display: inline-block; font-size: 10px; font-family: var(--mono); letter-spacing: .06em;
  padding: 2px 7px; border-radius: 3px; margin-left: 8px; vertical-align: middle; text-transform: uppercase;
}
.tag-blue { background: var(--blue-dim); color: var(--blue); }
.tag-green { background: var(--green-dim); color: var(--green); }
.tag-red { background: var(--red-dim); color: var(--red); }
.tag-amber { background: var(--amber-dim); color: var(--amber); }

/* panel header */
.panel-header {
  font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 18px;
  display: flex; align-items: center; gap: 4px;
}

/* overview insight */
.insight {
  background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--blue);
  border-radius: 0 8px 8px 0; padding: 12px 16px; margin-bottom: 10px;
  font-size: 13px; color: var(--text2); line-height: 1.6;
}
.insight strong { color: var(--text); font-weight: 500; }

/* breakdown cards */
.breakdown-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 8px;
  margin-bottom: 6px;
}
.breakdown-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; border-top-width: 2px;
}
.bc-total { border-top-color: var(--text3); }
.bc-up    { border-top-color: var(--blue); }
.bc-dw    { border-top-color: var(--amber); }
.bc-main  { border-top-color: rgba(255,255,255,0.15); }
.bc-head  { font-size: 10px; font-family: var(--mono); letter-spacing:.06em; text-transform:uppercase; color: var(--text3); margin-bottom: 6px; }
.bc-val   { font-size: 22px; font-weight: 700; font-family: var(--mono); color: var(--text); line-height: 1; margin-bottom: 4px; }
.bc-pct   { font-size: 10px; font-family: var(--mono); color: var(--text3); margin-bottom: 4px; }
.bc-money { font-size: 11px; font-family: var(--mono); color: var(--text2); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="logo">Dashboard Consolidado</span>
    <span class="date-badge">Jan–Abr 2026</span>
  </div>
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMain(this,'empresa')">Dashboard da Empresa</button>
    <button class="main-tab" onclick="switchMain(this,'buygoods')">BuyGoods — 4 Meses</button>
  </div>
</div>

<div class="content">

<!-- ══════════════════════════════ EMPRESA ══════════════════════════════ -->
<div id="main-empresa" class="main-panel active">
  <div class="sub-tabs">
    <button class="sub-btn active" onclick="switchSub(this,'empresa','jan')">Janeiro</button>
    <button class="sub-btn" onclick="switchSub(this,'empresa','fev')">Fevereiro</button>
    <button class="sub-btn" onclick="switchSub(this,'empresa','mar')">Março</button>
    <button class="sub-btn" onclick="switchSub(this,'empresa','abr')">Abril</button>
    <button class="sub-btn" onclick="switchSub(this,'empresa','all')">Visão Geral</button>
  </div>

  <div id="emp-jan" class="sub-panel active"></div>
  <div id="emp-fev" class="sub-panel"></div>
  <div id="emp-mar" class="sub-panel"></div>
  <div id="emp-abr" class="sub-panel"></div>
  <div id="emp-all" class="sub-panel"></div>

  <div class="charts-grid" style="margin-top:24px;">
    <div class="chart-card">
      <div class="chart-title">Vendas Front vs. Back por mês</div>
      <div style="position:relative;height:200px;"><canvas id="ec1"></canvas></div>
      <div class="legend" id="ec1-leg"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Net Profit vs. Refunds vs. Chargebacks ($)</div>
      <div style="position:relative;height:200px;"><canvas id="ec2"></canvas></div>
      <div class="legend" id="ec2-leg"></div>
    </div>
  </div>
  <div class="chart-full">
    <div class="chart-title">Taxas de Refund & Chargeback (% do faturamento)</div>
    <div style="position:relative;height:200px;"><canvas id="ec3"></canvas></div>
    <div class="legend" id="ec3-leg"></div>
  </div>
</div>

<!-- ══════════════════════════════ BUYGOODS ══════════════════════════════ -->
<div id="main-buygoods" class="main-panel">
  <div class="sub-tabs">
    <button class="sub-btn active" onclick="switchSub(this,'buygoods','jan')">Janeiro</button>
    <button class="sub-btn" onclick="switchSub(this,'buygoods','fev')">Fevereiro</button>
    <button class="sub-btn" onclick="switchSub(this,'buygoods','mar')">Março</button>
    <button class="sub-btn" onclick="switchSub(this,'buygoods','abr')">Abril</button>
    <button class="sub-btn" onclick="switchSub(this,'buygoods','all')">Visão Geral</button>
  </div>

  <div id="bg-jan" class="sub-panel active"></div>
  <div id="bg-fev" class="sub-panel"></div>
  <div id="bg-mar" class="sub-panel"></div>
  <div id="bg-abr" class="sub-panel"></div>
  <div id="bg-all" class="sub-panel"></div>

  <div class="charts-grid" style="margin-top:24px;">
    <div class="chart-card">
      <div class="chart-title">Total de vendas & upsells por mês</div>
      <div style="position:relative;height:200px;"><canvas id="bc1"></canvas></div>
      <div class="legend" id="bc1-leg"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Receita upsell vs. valor reembolsado ($)</div>
      <div style="position:relative;height:200px;"><canvas id="bc2"></canvas></div>
      <div class="legend" id="bc2-leg"></div>
    </div>
  </div>
  <div class="chart-full">
    <div class="chart-title">% Upsell e % Reembolso sobre total de vendas</div>
    <div style="position:relative;height:200px;"><canvas id="bc3"></canvas></div>
    <div class="legend" id="bc3-leg"></div>
  </div>
</div>

</div><!-- end content -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

/* ─────────────── DATA ─────────────── */
const empData = {
  jan: { label:'Janeiro', tag:'tag-blue', tagTxt:'Jan', faturamento:683512.35, front_sales:2572, front_rev:630268.73, back_sales:385, back_rev:52631.98, refunds:85142.68, chargebacks:4554.15, net_profit:54652.03, impostos:29334.01, plataforma:50810.78, comissoes:420001.48, cogs:68351.24, aov_bruto:265.25, aov_liq:234.59, up1:277, up1r:49000, dw1:57, dw1r:6000, up2:87, up2r:11000, up3:45, up3r:5000 },
  fev: { label:'Fevereiro', tag:'tag-blue', tagTxt:'Fev', faturamento:2172249.79, front_sales:8026, front_rev:1956587.45, back_sales:1519, back_rev:214229.77, refunds:230952.06, chargebacks:12995.68, net_profit:298553.53, impostos:91320.64, plataforma:161592.34, comissoes:1250931.2, cogs:217224.98, aov_bruto:270.35, aov_liq:239.14, up1:985, up1r:191000, dw1:202, dw1r:25000, up2:334, up2r:46000, up3:146, up3r:20000 },
  mar: { label:'Março', tag:'tag-blue', tagTxt:'Mar', faturamento:2722613.70, front_sales:9319, front_rev:2385943.39, back_sales:2361, back_rev:335900.77, refunds:344887.03, chargebacks:18737.97, net_profit:276584.19, impostos:116746.76, plataforma:187888.74, comissoes:1622254.4, cogs:272261.37, aov_bruto:294.65, aov_liq:259.47, up1:1186, up1r:271000, dw1:164, dw1r:28000, up2:322, up2r:68000, up3:116, up3r:18000 },
  abr: { label:'Abril', tag:'tag-amber', tagTxt:'Funil Agressivo', faturamento:2802332.91, front_sales:7670, front_rev:2144069.73, back_sales:3567, back_rev:657642.48, refunds:444262.33, chargebacks:28970.67, net_profit:464126.28, impostos:169205.09, plataforma:185764.76, comissoes:1398975.58, cogs:280233.29, aov_bruto:364.83, aov_liq:319.08, up1:2292, up1r:576000, dw1:75, dw1r:21000, up2:292, up2r:71000, up3:113, up3r:20000 }
};

const bgData = {
  jan: { label:'Janeiro', tag:'tag-blue', tagTxt:'Funil Padrão', total:6043, revenue:1294545.80, upsells:827, upsell_pct:13.7, downsells:239, refunds:693, refund_pct:11.5, chargebacks:34, refund_value:152428, upsell_rev:134471,
    ref_up:169, ref_up_val:29666, ref_dw:30, ref_dw_val:4134, ref_main:494, ref_main_val:118628,
    cb_up:11,  cb_up_val:1836,  cb_dw:0,  cb_dw_val:0,     cb_main:23, cb_main_val:5356 },
  fev: { label:'Fevereiro', tag:'tag-blue', tagTxt:'Funil Padrão', total:8151, revenue:1751633.80, upsells:639, upsell_pct:7.8, downsells:176, refunds:934, refund_pct:11.5, chargebacks:48, refund_value:207261, upsell_rev:120657,
    ref_up:140, ref_up_val:27325, ref_dw:23, ref_dw_val:2903, ref_main:771, ref_main_val:177033,
    cb_up:7,   cb_up_val:1443,  cb_dw:0,  cb_dw_val:0,     cb_main:41, cb_main_val:9636 },
  mar: { label:'Março', tag:'tag-blue', tagTxt:'Funil Padrão', total:11253, revenue:2453869.90, upsells:1255, upsell_pct:11.2, downsells:310, refunds:1294, refund_pct:11.5, chargebacks:66, refund_value:292596, upsell_rev:259431,
    ref_up:241, ref_up_val:50230, ref_dw:28, ref_dw_val:3729, ref_main:1025, ref_main_val:238637,
    cb_up:12,  cb_up_val:2565,  cb_dw:1,  cb_dw_val:99,    cb_main:53, cb_main_val:13700 },
  abr: { label:'Abril', tag:'tag-amber', tagTxt:'Funil Agressivo', total:11352, revenue:2603693.80, upsells:2292, upsell_pct:20.2, downsells:244, refunds:1263, refund_pct:11.1, chargebacks:71, refund_value:299839, upsell_rev:522684,
    ref_up:492, ref_up_val:113858, ref_dw:25, ref_dw_val:3900, ref_main:746, ref_main_val:182081,
    cb_up:19,  cb_up_val:4386,  cb_dw:0,  cb_dw_val:0,     cb_main:52, cb_main_val:12997 }
};

const keys = ['jan','fev','mar','abr'];

/* ─────────────── HELPERS ─────────────── */
const $ = id => document.getElementById(id);
const fmtD = v => '$' + v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDK = v => '$' + (v/1000).toFixed(1) + 'K';
const fmtN = v => v.toLocaleString('pt-BR');
const fmtP = v => v.toFixed(1) + '%';
const refPct = d => d.refunds/d.faturamento*100;
const cbPct  = d => d.chargebacks/d.faturamento*100;
const backPct= d => d.back_sales/(d.front_sales+d.back_sales)*100;
const netPct = d => d.net_profit/d.faturamento*100;
const pClass = p => p > 14 ? 'warn' : p > 10 ? 'amber' : 'good';

function barRowHTML(label, val, base, color) {
  const pct = Math.min(val/base*100, 100);
  return `<div class="bar-row">
    <span class="bar-label">${label}</span>
    <div class="bar-bg"><div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${color};">${pct.toFixed(1)}%</div></div>
    <span class="bar-val">${fmtN(val)} vendas</span>
  </div>`;
}

/* ─────────────── EMPRESA PANELS ─────────────── */
function buildEmpPanel(key) {
  const d = empData[key];
  const rp = refPct(d), cp = cbPct(d), bp = backPct(d), np = netPct(d);
  return `
  <div class="panel-header">${d.label} <span class="tag ${d.tag}">${d.tagTxt}</span></div>
  <div class="metrics-row">
    <div class="metric"><div class="metric-label">Faturamento</div><div class="metric-val info">${fmtDK(d.faturamento)}</div><div class="metric-sub">${fmtD(d.faturamento)}</div></div>
    <div class="metric"><div class="metric-label">Net Profit</div><div class="metric-val good">${fmtDK(d.net_profit)}</div><div class="metric-sub">${fmtP(np)} do faturamento</div></div>
    <div class="metric"><div class="metric-label">AOV Bruto</div><div class="metric-val">${fmtD(d.aov_bruto)}</div><div class="metric-sub">Líquido: ${fmtD(d.aov_liq)}</div></div>
    <div class="metric"><div class="metric-label">Vendas Front</div><div class="metric-val">${fmtN(d.front_sales)}</div><div class="metric-sub">${fmtDK(d.front_rev)}</div></div>
    <div class="metric"><div class="metric-label">Vendas Back</div><div class="metric-val info">${fmtN(d.back_sales)}</div><div class="metric-sub">${fmtP(bp)} do total</div></div>
  </div>
  <div class="metrics-row">
    <div class="metric"><div class="metric-label">Reembolsos</div><div class="metric-val ${pClass(rp)}">${fmtDK(d.refunds)}</div><div class="metric-sub">${fmtP(rp)} do faturamento</div></div>
    <div class="metric"><div class="metric-label">Chargebacks</div><div class="metric-val ${cp>0.8?'warn':'amber'}">${fmtDK(d.chargebacks)}</div><div class="metric-sub">${fmtP(cp)} do faturamento</div></div>
    <div class="metric"><div class="metric-label">Comissões</div><div class="metric-val warn">${fmtDK(d.comissoes)}</div><div class="metric-sub">${fmtP(d.comissoes/d.faturamento*100)} do fat.</div></div>
    <div class="metric"><div class="metric-label">Impostos</div><div class="metric-val">${fmtDK(d.impostos)}</div><div class="metric-sub">${fmtP(d.impostos/d.faturamento*100)} do fat.</div></div>
    <div class="metric"><div class="metric-label">Plataforma</div><div class="metric-val">${fmtDK(d.plataforma)}</div><div class="metric-sub">${fmtP(d.plataforma/d.faturamento*100)} do fat.</div></div>
  </div>
  <div class="sec-title">Funil de back-end (sobre vendas front)</div>
  ${barRowHTML('UP1',d.up1,d.front_sales,'#4d9fff')}
  ${barRowHTML('DW1',d.dw1,d.front_sales,'#55556a')}
  ${barRowHTML('UP2',d.up2,d.front_sales,'#3dd68c')}
  ${barRowHTML('UP3',d.up3,d.front_sales,'#f5a623')}`;
}

function buildEmpAll() {
  const rows = keys.map(k => {
    const d = empData[k];
    const rp = refPct(d), cp = cbPct(d), np = netPct(d);
    return `<tr>
      <td class="num">${d.label}</td>
      <td class="num info">${fmtDK(d.faturamento)}</td>
      <td class="num">${fmtN(d.front_sales)}</td>
      <td class="num info">${fmtN(d.back_sales)} <span style="color:var(--text3);font-size:10px;">(${fmtP(backPct(d))})</span></td>
      <td class="num good">${fmtDK(d.net_profit)} <span style="color:var(--text3);font-size:10px;">(${fmtP(np)})</span></td>
      <td class="${pClass(rp)}">${fmtDK(d.refunds)} <span style="color:var(--text3);font-size:10px;">(${fmtP(rp)})</span></td>
      <td class="${cp>0.8?'warn':'amber'}">${fmtDK(d.chargebacks)} <span style="color:var(--text3);font-size:10px;">(${fmtP(cp)})</span></td>
      <td class="num">${fmtD(d.aov_bruto)}</td>
    </tr>`;
  }).join('');

  const totalFat = keys.reduce((s,k)=>s+empData[k].faturamento,0);
  const totalNet = keys.reduce((s,k)=>s+empData[k].net_profit,0);
  const totalRef = keys.reduce((s,k)=>s+empData[k].refunds,0);
  const totalCB  = keys.reduce((s,k)=>s+empData[k].chargebacks,0);

  return `
  <div class="panel-header">Visão Geral — Jan a Abr 2026</div>
  <div class="metrics-row">
    <div class="metric"><div class="metric-label">Faturamento total</div><div class="metric-val info">${fmtDK(totalFat)}</div><div class="metric-sub">${fmtD(totalFat)}</div></div>
    <div class="metric"><div class="metric-label">Net Profit total</div><div class="metric-val good">${fmtDK(totalNet)}</div><div class="metric-sub">${fmtP(totalNet/totalFat*100)} do faturamento</div></div>
    <div class="metric"><div class="metric-label">Total reembolsos</div><div class="metric-val warn">${fmtDK(totalRef)}</div><div class="metric-sub">${fmtP(totalRef/totalFat*100)} do faturamento</div></div>
    <div class="metric"><div class="metric-label">Total chargebacks</div><div class="metric-val amber">${fmtDK(totalCB)}</div><div class="metric-sub">${fmtP(totalCB/totalFat*100)} do faturamento</div></div>
  </div>
  <div class="insight"><strong>Abril</strong> fechou com o maior net profit ($464K, 16,6%) mesmo com refunds em alta absoluta. O crescimento do back-end (3.567 vendas, 32% do total) foi o principal driver.</div>
  <div class="insight"><strong>Março</strong> apresenta o pior net profit relativo apesar do segundo maior faturamento — pico de comissões ($1,62M) e refunds ($344K) comprimiram a margem.</div>
  <div class="insight">A taxa de refund cresce a cada mês em termos absolutos e percentuais: de <strong>12,5%</strong> em janeiro até <strong>15,9%</strong> em abril. Sinal de atenção com o aumento do funil agressivo.</div>
  <div class="sec-title">Comparativo mensal</div>
  <div class="table-wrap"><table>
    <thead><tr><th>Mês</th><th>Faturamento</th><th>Front</th><th>Back (up+dw)</th><th>Net Profit</th><th>Refunds</th><th>Chargebacks</th><th>AOV Bruto</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

/* ─────────────── BUYGOODS PANELS ─────────────── */
function buildBgPanel(key) {
  const d = bgData[key];
  const rpct = d.refund_pct;
  const cpct = (d.chargebacks/d.total*100);
  const uRevVsRef = d.upsell_rev > d.refund_value;
  const fmtV = v => v > 0 ? '$'+fmtN(v) : '—';
  return `
  <div class="panel-header">${d.label} <span class="tag ${d.tag}">${d.tagTxt}</span></div>
  <div class="metrics-row">
    <div class="metric"><div class="metric-label">Total de vendas</div><div class="metric-val">${fmtN(d.total)}</div></div>
    <div class="metric"><div class="metric-label">Faturamento</div><div class="metric-val info">$${(d.revenue/1e6).toFixed(2)}M</div><div class="metric-sub">${fmtD(d.revenue)}</div></div>
    <div class="metric"><div class="metric-label">Upsells</div><div class="metric-val info">${fmtN(d.upsells)}</div><div class="metric-sub">${fmtP(d.upsell_pct)} do total</div></div>
    <div class="metric"><div class="metric-label">Downsells</div><div class="metric-val">${fmtN(d.downsells)}</div><div class="metric-sub">${fmtP(d.downsells/d.total*100)} do total</div></div>
    <div class="metric"><div class="metric-label">Receita upsell</div><div class="metric-val info">${fmtDK(d.upsell_rev)}</div></div>
  </div>

  <div class="sec-title">Reembolsos — geral e por tipo de oferta</div>
  <div class="breakdown-grid">
    <div class="breakdown-card bc-total">
      <div class="bc-head">Total</div>
      <div class="bc-val ${pClass(rpct)}">${fmtN(d.refunds)}</div>
      <div class="bc-pct">${fmtP(rpct)} das vendas</div>
      <div class="bc-money">${fmtDK(d.refund_value)}</div>
    </div>
    <div class="breakdown-card bc-up">
      <div class="bc-head">↑ Upsell</div>
      <div class="bc-val info">${fmtN(d.ref_up)}</div>
      <div class="bc-pct">${fmtP(d.ref_up/d.refunds*100)} dos refunds</div>
      <div class="bc-money">${fmtV(d.ref_up_val)}</div>
    </div>
    <div class="breakdown-card bc-dw">
      <div class="bc-head">↓ Downsell</div>
      <div class="bc-val">${fmtN(d.ref_dw)}</div>
      <div class="bc-pct">${fmtP(d.ref_dw/d.refunds*100)} dos refunds</div>
      <div class="bc-money">${fmtV(d.ref_dw_val)}</div>
    </div>
    <div class="breakdown-card bc-main">
      <div class="bc-head">Front / Main</div>
      <div class="bc-val">${fmtN(d.ref_main)}</div>
      <div class="bc-pct">${fmtP(d.ref_main/d.refunds*100)} dos refunds</div>
      <div class="bc-money">${fmtV(d.ref_main_val)}</div>
    </div>
  </div>

  <div class="sec-title">Chargebacks — geral e por tipo de oferta</div>
  <div class="breakdown-grid">
    <div class="breakdown-card bc-total">
      <div class="bc-head">Total</div>
      <div class="bc-val ${cpct>1?'warn':'amber'}">${fmtN(d.chargebacks)}</div>
      <div class="bc-pct">${fmtP(cpct)} das vendas</div>
      <div class="bc-money">—</div>
    </div>
    <div class="breakdown-card bc-up">
      <div class="bc-head">↑ Upsell</div>
      <div class="bc-val info">${fmtN(d.cb_up)}</div>
      <div class="bc-pct">${d.chargebacks>0?fmtP(d.cb_up/d.chargebacks*100):'—'} dos CBs</div>
      <div class="bc-money">${fmtV(d.cb_up_val)}</div>
    </div>
    <div class="breakdown-card bc-dw">
      <div class="bc-head">↓ Downsell</div>
      <div class="bc-val">${fmtN(d.cb_dw)}</div>
      <div class="bc-pct">${d.chargebacks>0?fmtP(d.cb_dw/d.chargebacks*100):'—'} dos CBs</div>
      <div class="bc-money">${fmtV(d.cb_dw_val)}</div>
    </div>
    <div class="breakdown-card bc-main">
      <div class="bc-head">Front / Main</div>
      <div class="bc-val">${fmtN(d.cb_main)}</div>
      <div class="bc-pct">${d.chargebacks>0?fmtP(d.cb_main/d.chargebacks*100):'—'} dos CBs</div>
      <div class="bc-money">${fmtV(d.cb_main_val)}</div>
    </div>
  </div>

  <div class="sec-title">Cobertura upsell vs. reembolso total</div>
  ${barRowHTML('Up. receita', d.upsell_rev, Math.max(d.upsell_rev,d.refund_value)*1.1, '#4d9fff')}
  ${barRowHTML('Reembolso',  d.refund_value, Math.max(d.upsell_rev,d.refund_value)*1.1, '#ff5f5f')}`;
}

function buildBgAll() {
  const rows = keys.map(k => {
    const d = bgData[k];
    const uOk = d.upsell_rev > d.refund_value;
    return `<tr>
      <td class="num">${d.label}</td>
      <td class="num">${fmtN(d.total)}</td>
      <td class="num info">${fmtN(d.upsells)} <span style="color:var(--text3);font-size:10px;">(${fmtP(d.upsell_pct)})</span></td>
      <td class="${pClass(d.refund_pct)}">${fmtN(d.refunds)} <span style="color:var(--text3);font-size:10px;">(${fmtP(d.refund_pct)})</span></td>
      <td class="info" style="font-size:11px;">${fmtN(d.ref_up)} up / ${fmtN(d.ref_dw)} dw / ${fmtN(d.ref_main)} front</td>
      <td class="${d.chargebacks>60?'warn':'good'}">${fmtN(d.chargebacks)}</td>
      <td style="font-size:11px;color:var(--text3);">${fmtN(d.cb_up)} up / ${fmtN(d.cb_dw)} dw / ${fmtN(d.cb_main)} front</td>
      <td class="num info">${fmtDK(d.upsell_rev)}</td>
      <td class="${uOk?'good':'warn'}">${fmtDK(d.refund_value)}</td>
    </tr>`;
  }).join('');

  return `
  <div class="panel-header">Visão Geral — BuyGoods Jan–Abr 2026</div>
  <div class="metrics-row">
    <div class="metric"><div class="metric-label">Total de vendas</div><div class="metric-val">${fmtN(keys.reduce((s,k)=>s+bgData[k].total,0))}</div></div>
    <div class="metric"><div class="metric-label">Total upsells</div><div class="metric-val info">${fmtN(keys.reduce((s,k)=>s+bgData[k].upsells,0))}</div></div>
    <div class="metric"><div class="metric-label">Total reembolsos</div><div class="metric-val amber">${fmtN(keys.reduce((s,k)=>s+bgData[k].refunds,0))}</div></div>
    <div class="metric"><div class="metric-label">Total chargebacks</div><div class="metric-val">${fmtN(keys.reduce((s,k)=>s+bgData[k].chargebacks,0))}</div></div>
  </div>
  <div class="insight">A taxa de reembolso ficou <strong>estável em ~11,5%</strong> nos quatro meses. O funil agressivo de abril <strong>não piorou</strong> a taxa de reembolso proporcional.</div>
  <div class="insight">Em <strong>janeiro e fevereiro</strong> a receita de upsell era menor que o valor reembolsado — o upsell mal se pagava. Isso mudou em março e abril, onde a receita upsell superou os reembolsos.</div>
  <div class="insight"><strong>Abril</strong>: upsells dobraram (7,8% → 20,2%), receita upsell saltou de $259K para $522K, enquanto o valor reembolsado cresceu apenas $7K. Margem positiva clara.</div>
  <div class="sec-title">Comparativo mensal</div>
  <div class="table-wrap"><table>
    <thead><tr><th>Mês</th><th>Vendas</th><th>Upsells</th><th>Reembolsos</th><th>Refund por tipo</th><th>Chargebacks</th><th>CB por tipo</th><th>Receita Up.</th><th>Reemb. ($)</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

/* ─────────────── RENDER PANELS ─────────────── */
keys.forEach(k => {
  $('emp-'+k).innerHTML = buildEmpPanel(k);
  $('bg-'+k).innerHTML  = buildBgPanel(k);
});
$('emp-all').innerHTML = buildEmpAll();
$('bg-all').innerHTML  = buildBgAll();

/* ─────────────── TAB LOGIC ─────────────── */
function switchMain(btn, tab) {
  document.querySelectorAll('.main-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
  $('main-'+tab).classList.add('active');
  btn.classList.add('active');
}

function switchSub(btn, prefix, key) {
  const panel = $('main-'+prefix);
  panel.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
  panel.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
  $(prefix === 'empresa' ? 'emp-'+key : 'bg-'+key).classList.add('active');
  btn.classList.add('active');
}

/* ─────────────── CHARTS ─────────────── */
Chart.defaults.color = '#55556a';
Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
const months = ['Jan','Fev','Mar','Abr'];
const noLeg = { plugins:{ legend:{display:false} }, responsive:true, maintainAspectRatio:false };
const gridOpts = { color:'rgba(255,255,255,0.04)' };

// EMPRESA chart 1 — front vs back
new Chart($('ec1'), {
  type:'bar',
  data:{ labels:months, datasets:[
    { label:'Front', data:keys.map(k=>empData[k].front_sales), backgroundColor:'#4d9fff', borderRadius:3 },
    { label:'Back', data:keys.map(k=>empData[k].back_sales), backgroundColor:'#3dd68c', borderRadius:3 },
  ]},
  options:{ ...noLeg, scales:{ x:{grid:{display:false},ticks:{color:'#55556a'}}, y:{grid:gridOpts,ticks:{color:'#55556a',callback:v=>fmtN(v)}} }}
});
$('ec1-leg').innerHTML = [['#4d9fff','Front (vendas)'],['#3dd68c','Back — up+dw (vendas)']].map(([c,l])=>`<span class="legend-item"><span class="legend-dot" style="background:${c};"></span>${l}</span>`).join('');

// EMPRESA chart 2 — net profit vs refunds vs chargebacks
new Chart($('ec2'), {
  type:'bar',
  data:{ labels:months, datasets:[
    { label:'Net Profit', data:keys.map(k=>Math.round(empData[k].net_profit)), backgroundColor:'#3dd68c', borderRadius:3 },
    { label:'Refunds', data:keys.map(k=>Math.round(empData[k].refunds)), backgroundColor:'#ff5f5f', borderRadius:3 },
    { label:'Chargebacks', data:keys.map(k=>Math.round(empData[k].chargebacks)), backgroundColor:'#f5a623', borderRadius:3 },
  ]},
  options:{ ...noLeg, scales:{ x:{grid:{display:false},ticks:{color:'#55556a'}}, y:{grid:gridOpts,ticks:{color:'#55556a',callback:v=>'$'+(v/1000).toFixed(0)+'K'}} }}
});
$('ec2-leg').innerHTML = [['#3dd68c','Net Profit'],['#ff5f5f','Refunds'],['#f5a623','Chargebacks']].map(([c,l])=>`<span class="legend-item"><span class="legend-dot" style="background:${c};"></span>${l}</span>`).join('');

// EMPRESA chart 3 — refund/chargeback %
new Chart($('ec3'), {
  type:'line',
  data:{ labels:months, datasets:[
    { label:'Refund %', data:keys.map(k=>parseFloat(refPct(empData[k]).toFixed(2))), borderColor:'#ff5f5f', backgroundColor:'rgba(255,95,95,0.08)', fill:true, tension:0.35, pointRadius:5, pointBackgroundColor:'#ff5f5f' },
    { label:'Chargeback %', data:keys.map(k=>parseFloat(cbPct(empData[k]).toFixed(2))), borderColor:'#f5a623', backgroundColor:'rgba(245,166,35,0.08)', fill:true, tension:0.35, pointRadius:5, pointBackgroundColor:'#f5a623', borderDash:[5,4] },
  ]},
  options:{ ...noLeg, scales:{ x:{grid:{display:false},ticks:{color:'#55556a'}}, y:{grid:gridOpts,ticks:{color:'#55556a',callback:v=>v+'%'}} }}
});
$('ec3-leg').innerHTML = [['#ff5f5f','Refund % do faturamento'],['#f5a623','Chargeback % do faturamento']].map(([c,l])=>`<span class="legend-item"><span class="legend-dot" style="background:${c};"></span>${l}</span>`).join('');

// BUYGOODS chart 1 — vendas & upsells
new Chart($('bc1'), {
  type:'bar',
  data:{ labels:months, datasets:[
    { label:'Total vendas', data:keys.map(k=>bgData[k].total), backgroundColor:'rgba(77,159,255,0.25)', borderColor:'#4d9fff', borderWidth:1, borderRadius:3 },
    { label:'Upsells', data:keys.map(k=>bgData[k].upsells), backgroundColor:'#4d9fff', borderRadius:3 },
  ]},
  options:{ ...noLeg, scales:{ x:{grid:{display:false},ticks:{color:'#55556a'}}, y:{grid:gridOpts,ticks:{color:'#55556a',callback:v=>fmtN(v)}} }}
});
$('bc1-leg').innerHTML = [['rgba(77,159,255,0.5)','Total vendas'],['#4d9fff','Upsells']].map(([c,l])=>`<span class="legend-item"><span class="legend-dot" style="background:${c};border:1px solid #4d9fff;"></span>${l}</span>`).join('');

// BUYGOODS chart 2 — upsell rev vs refunds
new Chart($('bc2'), {
  type:'bar',
  data:{ labels:months, datasets:[
    { label:'Receita upsell', data:keys.map(k=>bgData[k].upsell_rev), backgroundColor:'#4d9fff', borderRadius:3 },
    { label:'Valor reembolsado', data:keys.map(k=>bgData[k].refund_value), backgroundColor:'rgba(255,95,95,0.3)', borderColor:'#ff5f5f', borderWidth:1, borderRadius:3 },
  ]},
  options:{ ...noLeg, scales:{ x:{grid:{display:false},ticks:{color:'#55556a'}}, y:{grid:gridOpts,ticks:{color:'#55556a',callback:v=>'$'+(v/1000).toFixed(0)+'K'}} }}
});
$('bc2-leg').innerHTML = [['#4d9fff','Receita upsell'],['rgba(255,95,95,0.5)','Valor reembolsado']].map(([c,l])=>`<span class="legend-item"><span class="legend-dot" style="background:${c};border:1px solid #ff5f5f;"></span>${l}</span>`).join('');

// BUYGOODS chart 3 — % upsell & % refund
new Chart($('bc3'), {
  type:'line',
  data:{ labels:months, datasets:[
    { label:'% upsell', data:keys.map(k=>bgData[k].upsell_pct), borderColor:'#4d9fff', backgroundColor:'rgba(77,159,255,0.1)', fill:true, tension:0.35, pointRadius:5, pointBackgroundColor:'#4d9fff' },
    { label:'% reembolso', data:keys.map(k=>bgData[k].refund_pct), borderColor:'#ff5f5f', backgroundColor:'rgba(255,95,95,0.06)', fill:true, tension:0.35, pointRadius:5, pointBackgroundColor:'#ff5f5f', borderDash:[5,4] },
    { label:'% chargeback', data:keys.map(k=>parseFloat((bgData[k].chargebacks/bgData[k].total*100).toFixed(2))), borderColor:'#f5a623', backgroundColor:'transparent', tension:0.35, pointRadius:4, pointBackgroundColor:'#f5a623', borderDash:[2,4] },
  ]},
  options:{ ...noLeg, scales:{ x:{grid:{display:false},ticks:{color:'#55556a'}}, y:{grid:gridOpts,ticks:{color:'#55556a',callback:v=>v.toFixed(1)+'%'}} }}
});
$('bc3-leg').innerHTML = [['#4d9fff','% upsell'],['#ff5f5f','% reembolso'],['#f5a623','% chargeback']].map(([c,l])=>`<span class="legend-item"><span class="legend-dot" style="background:${c};"></span>${l}</span>`).join('');

</script>
