<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; padding: 16px; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e0e0e0; }
  .tab-btn { background: transparent; border: 0.5px solid #333; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #999; transition: all .2s; }
  .tab-btn.active { background: #1a2a3a; color: #5aabff; border-color: transparent; font-weight: 500; }
  .metric { background: #111; border: 0.5px solid #222; border-radius: 8px; padding: 12px 14px; }
  .metric-label { font-size: 12px; color: #777; margin: 0 0 4px; }
  .metric-val { font-size: 20px; font-weight: 500; color: #e8e8e8; margin: 0; }
  .metric-sub { font-size: 11px; color: #555; margin: 4px 0 0; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-label { font-size: 12px; color: #888; min-width: 70px; text-align: right; }
  .bar-bg { flex: 1; background: #1a1a1a; border-radius: 3px; height: 20px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 11px; font-weight: 500; transition: width 0.4s; }
  .bar-val { font-size: 12px; color: #666; min-width: 72px; }
  .warn { color: #ff6b6b; }
  .good { color: #3dd68c; }
  .neutral { color: #999; }
  .section-title { font-size: 13px; font-weight: 500; color: #666; margin: 1.5rem 0 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
  table { background: #000; }
  th { color: #666 !important; }
  td { color: #ccc; border-bottom: 0.5px solid #1a1a1a; }
  tr:hover td { background: #0d0d0d; }
</style>
</head>
<body>
<div style="padding: 0.5rem 0;">

<div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem;">
  <button class="tab-btn active" onclick="show('jan')">Janeiro</button>
  <button class="tab-btn" onclick="show('fev')">Fevereiro</button>
  <button class="tab-btn" onclick="show('mar')">Março</button>
  <button class="tab-btn" onclick="show('abr')">Abril</button>
  <button class="tab-btn" onclick="show('all')">Visão geral</button>
</div>

<div id="panel-jan"></div>
<div id="panel-fev" style="display:none"></div>
<div id="panel-mar" style="display:none"></div>
<div id="panel-abr" style="display:none"></div>
<div id="panel-all" style="display:none"></div>

<div style="margin-top: 2rem; position: relative; height: 320px;">
  <canvas id="chart1"></canvas>
</div>
<div id="legend1" style="display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; font-size:12px; color:#666;"></div>

<div style="margin-top: 2rem; position: relative; height: 240px;">
  <canvas id="chart2"></canvas>
</div>
<div id="legend2" style="display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; font-size:12px; color:#666;"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
Chart.defaults.color = '#666';
Chart.defaults.borderColor = '#222';

const months = ['Jan', 'Fev', 'Mar', 'Abr'];
const data = {
  jan: {
    label:'Janeiro', faturamento:683512.35,
    front_sales:2572, front_rev:630268.73,
    back_sales:385, back_rev:52631.98,
    refunds:85142.68, chargebacks:4554.15, net_profit:54652.03,
    impostos:29334.01, plataforma:50810.78,
    comissoes:420001.48, cogs:68351.24,
    aov_bruto:265.25, aov_liq:234.59,
    up1:277, up1r:49000, dw1:57, dw1r:6000,
    up2:87, up2r:11000, up3:45, up3r:5000,
  },
  fev: {
    label:'Fevereiro', faturamento:2172249.79,
    front_sales:8026, front_rev:1956587.45,
    back_sales:1519, back_rev:214229.77,
    refunds:230952.06, chargebacks:12995.68, net_profit:298553.53,
    impostos:91320.64, plataforma:161592.34,
    comissoes:1250931.2, cogs:217224.98,
    aov_bruto:270.35, aov_liq:239.14,
    up1:985, up1r:191000, dw1:202, dw1r:25000,
    up2:334, up2r:46000, up3:146, up3r:20000,
  },
  mar: {
    label:'Março', faturamento:2722613.7,
    front_sales:9319, front_rev:2385943.39,
    back_sales:2361, back_rev:335900.77,
    refunds:344887.03, chargebacks:18737.97, net_profit:276584.19,
    impostos:116746.76, plataforma:187888.74,
    comissoes:1622254.4, cogs:272261.37,
    aov_bruto:294.65, aov_liq:259.47,
    up1:1186, up1r:271000, dw1:164, dw1r:28000,
    up2:322, up2r:68000, up3:116, up3r:18000,
  },
  abr: {
    label:'Abril', faturamento:2802332.91,
    front_sales:7670, front_rev:2144069.73,
    back_sales:3567, back_rev:657642.48,
    refunds:444262.33, chargebacks:28970.67, net_profit:464126.28,
    impostos:169205.09, plataforma:185764.76,
    comissoes:1398975.58, cogs:280233.29,
    aov_bruto:364.83, aov_liq:319.08,
    up1:2292, up1r:576000, dw1:75, dw1r:21000,
    up2:292, up2r:71000, up3:113, up3r:20000,
  }
};

const keys = ['jan','fev','mar','abr'];

function fmt(v, type) {
  if (type === '$') return '$' + v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  if (type === '%') return v.toFixed(1) + '%';
  if (type === 'n') return v.toLocaleString('pt-BR');
  return v;
}

function refPct(d)    { return d.refunds / d.faturamento * 100; }
function cbPct(d)     { return d.chargebacks / d.faturamento * 100; }
function backPct(d)   { return d.back_sales / (d.front_sales + d.back_sales) * 100; }
function refPerBack(d){ return d.refunds / d.back_rev * 100; }

function buildPanel(key) {
  const d = data[key];
  const rpct = refPct(d), cpct = cbPct(d), bpct = backPct(d), rbpct = refPerBack(d);
  const rpctClass = rpct > 14 ? 'warn' : rpct > 10 ? 'neutral' : 'good';
  const cpctClass = cpct > 0.8 ? 'warn' : 'good';
  return `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.25rem;">
      <div class="metric"><p class="metric-label">Faturamento total</p><p class="metric-val">${fmt(d.faturamento,'$')}</p></div>
      <div class="metric"><p class="metric-label">Vendas front</p><p class="metric-val">${fmt(d.front_sales,'n')}</p><p class="metric-sub">${fmt(d.front_rev,'$')}</p></div>
      <div class="metric"><p class="metric-label">Vendas back (up+dw)</p><p class="metric-val">${fmt(d.back_sales,'n')}</p><p class="metric-sub">${fmt(d.back_rev,'$')}</p></div>
      <div class="metric"><p class="metric-label">Net Profit</p><p class="metric-val">${fmt(d.net_profit,'$')}</p></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem;">
      <div class="metric"><p class="metric-label">Reembolsos</p><p class="metric-val ${rpctClass}">${fmt(d.refunds,'$')}</p><p class="metric-sub">${fmt(rpct,'%')} do faturamento</p></div>
      <div class="metric"><p class="metric-label">Chargebacks</p><p class="metric-val ${cpctClass}">${fmt(d.chargebacks,'$')}</p><p class="metric-sub">${fmt(cpct,'%')} do faturamento</p></div>
      <div class="metric"><p class="metric-label">Back % do total de vendas</p><p class="metric-val">${fmt(bpct,'%')}</p></div>
      <div class="metric"><p class="metric-label">Refund s/ receita back</p><p class="metric-val ${rbpct>40?'warn':'neutral'}">${fmt(rbpct,'%')}</p></div>
    </div>
    <p class="section-title">Funil de back-end</p>
    <div>
      ${barRow('UP1', d.up1, d.front_sales, '#378ADD')}
      ${barRow('DW1', d.dw1, d.front_sales, '#5a5a52')}
      ${barRow('UP2', d.up2, d.front_sales, '#1D9E75')}
      ${barRow('UP3', d.up3, d.front_sales, '#BA7517')}
    </div>`;
}

function barRow(label, val, base, color) {
  const pct = Math.min((val / base * 100), 100);
  return `<div class="bar-row">
    <span class="bar-label">${label}</span>
    <div class="bar-bg"><div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${color};color:#fff;">${pct.toFixed(1)}%</div></div>
    <span class="bar-val">${val.toLocaleString('pt-BR')} vendas</span>
  </div>`;
}

function buildAll() {
  const rows = keys.map(k => {
    const d = data[k];
    const rpct = refPct(d), cpct = cbPct(d);
    const rpctClass = rpct > 14 ? 'warn' : rpct > 10 ? 'neutral' : 'good';
    return `<tr>
      <td style="padding:8px 10px;font-weight:500;font-size:13px;">${d.label}</td>
      <td style="padding:8px 10px;font-size:13px;">${fmt(d.faturamento,'$')}</td>
      <td style="padding:8px 10px;font-size:13px;">${fmt(d.back_sales,'n')}</td>
      <td style="padding:8px 10px;font-size:13px;">${fmt(d.back_rev,'$')}</td>
      <td style="padding:8px 10px;font-size:13px;font-weight:500;" class="${rpctClass}">${fmt(d.refunds,'$')} <span style="font-weight:400;font-size:11px;">(${fmt(rpct,'%')})</span></td>
      <td style="padding:8px 10px;font-size:13px;">${fmt(d.chargebacks,'$')} <span style="font-size:11px;">(${fmt(cpct,'%')})</span></td>
      <td style="padding:8px 10px;font-size:13px;font-weight:500;">${fmt(d.net_profit,'$')}</td>
    </tr>`;
  }).join('');
  return `<div style="overflow-x:auto;">
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <thead><tr style="border-bottom:0.5px solid #222;">
        ${['Mês','Faturamento','Vendas back','Receita back','Refunds','Chargebacks','Net Profit']
          .map(h=>`<th style="padding:8px 10px;text-align:left;font-weight:500;color:#555;font-size:12px;">${h}</th>`).join('')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

keys.forEach(k => { document.getElementById('panel-'+k).innerHTML = buildPanel(k); });
document.getElementById('panel-all').innerHTML = buildAll();

function show(k) {
  keys.forEach(m => { document.getElementById('panel-'+m).style.display = 'none'; });
  document.getElementById('panel-all').style.display = 'none';
  document.getElementById('panel-'+k).style.display = 'block';
  document.querySelectorAll('.tab-btn').forEach(b => {
    const match = k === 'all' ? b.textContent.toLowerCase().includes('geral') : b.textContent.toLowerCase().startsWith(data[k]?.label?.slice(0,3).toLowerCase() || k);
    b.classList.toggle('active', match);
  });
}

// Chart 1
const ctx1 = document.getElementById('chart1').getContext('2d');
new Chart(ctx1, {
  type: 'bar',
  data: {
    labels: months,
    datasets: [
      { label:'Front', data: keys.map(k=>data[k].front_sales), backgroundColor:'#378ADD', borderRadius:3 },
      { label:'Back (up+dw)', data: keys.map(k=>data[k].back_sales), backgroundColor:'#1D9E75', borderRadius:3 },
      { label:'Refunds ($)', data: keys.map(k=>Math.round(data[k].refunds)), backgroundColor:'#E24B4A', borderRadius:3, yAxisID:'y2' },
      { label:'Chargebacks ($)', data: keys.map(k=>Math.round(data[k].chargebacks)), backgroundColor:'#EF9F27', borderRadius:3, yAxisID:'y2' },
    ]
  },
  options: {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ display:false } },
    scales:{
      y:{ title:{display:true,text:'Qtd. vendas',font:{size:11},color:'#555'}, ticks:{color:'#555',font:{size:11}}, grid:{color:'rgba(255,255,255,0.05)'} },
      y2:{ position:'right', title:{display:true,text:'Valor ($)',font:{size:11},color:'#555'}, ticks:{color:'#555',font:{size:11},callback:v=>'$'+(v/1000).toFixed(0)+'K'}, grid:{drawOnChartArea:false} },
      x:{ ticks:{color:'#555',font:{size:12}}, grid:{display:false} }
    }
  }
});

const l1 = document.getElementById('legend1');
[['#378ADD','Front (vendas)'],['#1D9E75','Back — up+dw (vendas)'],['#E24B4A','Refunds ($)'],['#EF9F27','Chargebacks ($)']].forEach(([c,lbl])=>{
  l1.innerHTML += `<span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:${c};display:inline-block;"></span>${lbl}</span>`;
});

// Chart 2
const ctx2 = document.getElementById('chart2').getContext('2d');
new Chart(ctx2, {
  type:'line',
  data:{
    labels:months,
    datasets:[
      { label:'Refund % do fat.', data:keys.map(k=>parseFloat(refPct(data[k]).toFixed(2))), borderColor:'#E24B4A', backgroundColor:'rgba(226,75,74,0.12)', fill:true, tension:0.3, pointRadius:5 },
      { label:'Chargeback % do fat.', data:keys.map(k=>parseFloat(cbPct(data[k]).toFixed(2))), borderColor:'#EF9F27', backgroundColor:'rgba(239,159,39,0.12)', fill:true, tension:0.3, pointRadius:5, borderDash:[5,4] },
    ]
  },
  options:{
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ display:false } },
    scales:{
      y:{ ticks:{callback:v=>v+'%',color:'#555',font:{size:11}}, grid:{color:'rgba(255,255,255,0.05)'} },
      x:{ ticks:{color:'#555',font:{size:12}}, grid:{display:false} }
    }
  }
});

const l2 = document.getElementById('legend2');
[['#E24B4A','Refund % do faturamento'],['#EF9F27','Chargeback % do faturamento']].forEach(([c,lbl])=>{
  l2.innerHTML += `<span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:${c};display:inline-block;"></span>${lbl}</span>`;
});
</script>
</body>
</html>
