<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Consolidado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Epilogue:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

[data-theme="dark"] {
  --bg:      #06060a;
  --bg1:     #0d0d14;
  --bg2:     #12121c;
  --bg3:     #1a1a28;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text:    #eeeef8;
  --text2:   #8080a8;
  --text3:   #48486a;
  --blue:    #5aabff;
  --blue-d:  rgba(90,171,255,0.13);
  --green:   #3dd68c;
  --green-d: rgba(61,214,140,0.11);
  --red:     #ff6060;
  --red-d:   rgba(255,96,96,0.11);
  --amber:   #f5a623;
  --amber-d: rgba(245,166,35,0.11);
  --shadow:  0 2px 20px rgba(0,0,0,0.55);
  --grid:    rgba(255,255,255,0.04);
  --tick:    #48486a;
}
[data-theme="light"] {
  --bg:      #f2f2f8;
  --bg1:     #ffffff;
  --bg2:     #f8f8fc;
  --bg3:     #ebebf4;
  --border:  rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text:    #111122;
  --text2:   #4a4a70;
  --text3:   #9090b8;
  --blue:    #1a7aef;
  --blue-d:  rgba(26,122,239,0.10);
  --green:   #179057;
  --green-d: rgba(23,144,87,0.10);
  --red:     #d43030;
  --red-d:   rgba(212,48,48,0.10);
  --amber:   #bf7600;
  --amber-d: rgba(191,118,0,0.10);
  --shadow:  0 2px 14px rgba(0,0,0,0.08);
  --grid:    rgba(0,0,0,0.06);
  --tick:    #9090b8;
}

body {
  background: var(--bg); font-family: 'Epilogue', sans-serif;
  color: var(--text); min-height: 100vh;
  transition: background .3s, color .3s;
}

/* HEADER */
.header {
  border-bottom: 1px solid var(--border2); padding: 18px 28px 0;
  background: var(--bg1); position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow); transition: background .3s, box-shadow .3s;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.logo {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600;
  letter-spacing: .18em; text-transform: uppercase; color: var(--text3);
}
.header-right { display: flex; align-items: center; gap: 10px; }
.date-badge {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3);
  background: var(--bg3); border: 1px solid var(--border2); border-radius: 5px; padding: 3px 10px;
}
.theme-btn {
  background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px;
  padding: 5px 10px; cursor: pointer; font-size: 15px; line-height: 1;
  color: var(--text2); transition: border-color .18s, color .18s;
}
.theme-btn:hover { border-color: var(--blue); color: var(--blue); }

/* MAIN TABS */
.main-tabs { display: flex; }
.main-tab {
  font-family: 'Epilogue', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: .01em; padding: 10px 24px 12px; cursor: pointer;
  border: none; background: transparent; color: var(--text3);
  position: relative; transition: color .2s;
}
.main-tab::after {
  content: ''; position: absolute; bottom: 0; left: 8px; right: 8px; height: 2px;
  background: transparent; transition: background .2s; border-radius: 2px;
}
.main-tab.active { color: var(--text); }
.main-tab.active::after { background: var(--blue); }
.main-tab:hover:not(.active) { color: var(--text2); }

/* CONTENT */
.content { padding: 26px 28px 48px; }
.main-panel { display: none; }
.main-panel.active { display: block; }

/* SUB TABS */
.sub-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 26px; }
.sub-btn {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
  letter-spacing: .09em; text-transform: uppercase;
  padding: 6px 16px; border: 1px solid var(--border2); border-radius: 5px;
  background: transparent; color: var(--text3); cursor: pointer; transition: all .18s;
}
.sub-btn.active { background: var(--blue-d); border-color: var(--blue); color: var(--blue); }
.sub-btn:hover:not(.active) { color: var(--text2); }

/* PANELS */
.sub-panel { display: none; }
.sub-panel.active { display: block; animation: fadeUp .22s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* PANEL HEADER */
.panel-header {
  font-size: 24px; font-weight: 900; letter-spacing: -.03em; line-height: 1.1;
  color: var(--text); margin-bottom: 22px; display: flex; align-items: center; gap: 10px;
}

/* METRIC CARDS */
.metrics-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(148px, 1fr)); gap: 10px;
  margin-bottom: 12px;
}
.metric {
  background: var(--bg1); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; transition: border-color .18s, background .3s;
}
.metric:hover { border-color: var(--border2); }
.metric-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 7px;
}
.metric-val {
  font-family: 'Epilogue', sans-serif; font-size: 22px; font-weight: 900;
  letter-spacing: -.04em; color: var(--text); line-height: 1;
}
.metric-sub {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); margin-top: 5px;
}
.metric-val.good  { color: var(--green); }
.metric-val.warn  { color: var(--red); }
.metric-val.info  { color: var(--blue); }
.metric-val.amber { color: var(--amber); }

/* SECTION TITLE */
.sec-title {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
  letter-spacing: .13em; text-transform: uppercase; color: var(--text3);
  margin: 26px 0 13px; padding-left: 10px; border-left: 3px solid var(--blue);
}

/* BREAKDOWN CARDS */
.breakdown-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(148px, 1fr)); gap: 8px;
  margin-bottom: 4px;
}
.breakdown-card {
  background: var(--bg1); border: 1px solid var(--border);
  border-top: 3px solid var(--border2); border-radius: 10px;
  padding: 14px 16px; transition: background .3s, border-color .18s;
}
.breakdown-card:hover { border-color: var(--border2); }
.bc-total { border-top-color: var(--text3); }
.bc-up    { border-top-color: var(--blue); }
.bc-dw    { border-top-color: var(--amber); }
.bc-main  { border-top-color: var(--green); }
.bc-head {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
  letter-spacing: .09em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px;
}
.bc-val {
  font-family: 'Epilogue', sans-serif; font-size: 30px; font-weight: 900;
  letter-spacing: -.05em; color: var(--text); line-height: 1; margin-bottom: 6px;
}
.bc-pct-main {
  font-family: 'Epilogue', sans-serif; font-size: 14px; font-weight: 800;
  letter-spacing: -.01em; margin-bottom: 2px;
}
.bc-pct-sub {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); margin-bottom: 5px;
}
.bc-money { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; color: var(--text2); }
.bc-total .bc-pct-main { color: var(--text2); }
.bc-up    .bc-pct-main { color: var(--blue); }
.bc-dw    .bc-pct-main { color: var(--amber); }
.bc-main  .bc-pct-main { color: var(--green); }

/* BAR ROWS */
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.bar-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600;
  color: var(--text2); min-width: 44px; text-align: right;
}
.bar-bg { flex: 1; background: var(--bg3); border-radius: 4px; height: 22px; overflow: hidden; }
.bar-fill {
  height: 100%; border-radius: 4px; display: flex; align-items: center;
  justify-content: flex-end; padding-right: 8px;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; color: #fff;
  transition: width .55s cubic-bezier(.25,.46,.45,.94);
}
.bar-val { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); min-width: 80px; }

/* TABLE */
.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; margin-top: 6px; }
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--border2); }
th {
  padding: 10px 14px; text-align: left; white-space: nowrap;
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
  letter-spacing: .09em; text-transform: uppercase; color: var(--text3);
}
td {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text2);
  transition: background .15s;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }
td.num   { color: var(--text); font-weight: 600; }
td.good  { color: var(--green); font-weight: 600; }
td.warn  { color: var(--red); font-weight: 600; }
td.amber { color: var(--amber); font-weight: 600; }
td.info  { color: var(--blue); font-weight: 600; }

/* CHARTS */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 22px; }
@media (max-width: 680px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-card, .chart-full {
  background: var(--bg1); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 18px; transition: background .3s;
}
.chart-full { margin-top: 14px; }
.chart-title {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 14px;
}
.legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* TAGS */
.tag {
  display: inline-block; font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 4px;
}
.tag-blue  { background: var(--blue-d);  color: var(--blue); }
.tag-amber { background: var(--amber-d); color: var(--amber); }
.tag-green { background: var(--green-d); color: var(--green); }

/* INSIGHTS */
.insight {
  background: var(--bg2); border: 1px solid var(--border);
  border-left: 3px solid var(--blue); border-radius: 0 10px 10px 0;
  padding: 12px 16px; margin-bottom: 10px;
  font-size: 13px; line-height: 1.65; color: var(--text2);
  transition: background .3s;
}
.insight strong { color: var(--text); font-weight: 700; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="logo">Dashboard Consolidado</span>
    <div class="header-right">

  </div>
  <div class="chart-full">

    <div class="legend" id="ec3-leg"></div>
  </div>
</div>

<div id="main-buygoods" class="main-panel">

  <div id="bg-fev" class="sub-panel"></div>
  <div id="bg-mar" class="sub-panel"></div>
  <div id="bg-abr" class="sub-panel"></div>
  <div id="bg-mai" class="sub-panel"></div>
  <div id="bg-all" class="sub-panel"></div>
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Total de vendas & upsells por mês</div>
      <div style="position:relative;height:200px;"><canvas id="bc1" role="img" aria-label="Total de vendas e upsells"></canvas></div>
      <div class="legend" id="bc1-leg"></div>
    </div>

      <div class="legend" id="bc2-leg"></div>

  </div>
  <div class="chart-full">

    <div class="legend" id="bc3-leg"></div>

</div>

<div id="main-intervalo" class="main-panel">

    <button class="sub-btn" onclick="switchSub(this,'intervalo','abr')">Abril</button>
    <button class="sub-btn" onclick="switchSub(this,'intervalo','mai')">Maio ∂</button>

  </div>
  <div id="int-jan" class="sub-panel active"></div>
  <div id="int-fev" class="sub-panel"></div>
  <div id="int-mar" class="sub-panel"></div>
  <div id="int-abr" class="sub-panel"></div>
  <div id="int-mai" class="sub-panel"></div>
  <div id="int-all" class="sub-panel"></div>
</div>

</div>

const OT_LABEL  = {upsell:'↑ Upsell', downsell:'↓ Downsell', main:'Front/Main'};

function sumBuckets(obj) { return BUCKETS.reduce((s,b)=>s+(obj[b]||0),0); }

function stackedBarHTML(offerType, data, total) {
  const rowTotal = sumBuckets(data);
  if (rowTotal === 0) return '';
  const bars = BUCKETS.map(b => {
    const v = data[b]||0; if (!v) return '';
    const w = (v/Math.max(total,1)*100).toFixed(1);
    const pct = (v/rowTotal*100).toFixed(0);
    return `<div title="${BKT_LABEL[b]}: ${v} (${pct}% deste tipo)" style="width:${w}%;background:${BKT_COLOR[b]};height:100%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;min-width:${w>4?'0':'0'}px;">${w>5?v:''}</div>`;
  }).join('');
  return `<div style="margin-bottom:10px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
      <span style="min-width:90px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:${OT_COLOR[offerType]};">${OT_LABEL[offerType]}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);">${rowTotal} ocorrências</span>
    </div>
    <div style="display:flex;height:26px;border-radius:5px;overflow:hidden;background:var(--bg3);">${bars}</div>
    <div style="display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;">
      ${BUCKETS.map(b=>{const v=data[b]||0; const p=(v/rowTotal*100).toFixed(0); return v>0?`<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);"><span style="display:inline-block;width:7px;height:7px;background:${BKT_COLOR[b]};border-radius:1px;margin-right:3px;vertical-align:middle;"></span>${BKT_LABEL[b]}: <strong style="color:var(--text2);">${v}</strong> <span style="opacity:.6;">(${p}%)</span></span>`:''}).join('')}
    </div>
  </div>`;
}

function buildIntPanel(key) {
  const d = intData[key];
  const rTotal = ['upsell','downsell','main'].reduce((s,ot)=>s+sumBuckets(d.refund[ot]),0);
  const cTotal = ['upsell','downsell','main'].reduce((s,ot)=>s+sumBuckets(d.chargeback[ot]),0);

  const bucketSummary = (event) => BUCKETS.map(b=>{
    const tot = ['upsell','downsell','main'].reduce((s,ot)=>s+(d[event][ot][b]||0),0);
    const pct = (event==='refund'?rTotal:cTotal)>0?(tot/(event==='refund'?rTotal:cTotal)*100).toFixed(1):'0';
    return tot>0?`<div class="metric"><div class="metric-label">${BKT_LABEL[b]}</div><div class="metric-val" style="color:${BKT_COLOR[b]};">${tot}</div><div class="metric-sub">${pct}% do total</div></div>`:'';
  }).join('');

  return `<div class="panel-header">${d.label} <span class="tag ${d.tag}">${d.tagTxt}</span></div>

  <div class="sec-title">Reembolsos por intervalo (total: ${rTotal})</div>

  <div class="sec-title" style="margin-top:28px;">Chargebacks por intervalo (total: ${cTotal})</div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
      ${BUCKETS.map(b=>`<span style="display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);"><span style="width:8px;height:8px;background:${BKT_COLOR[b]};border-radius:2px;display:inline-block;"></span>${BKT_LABEL[b]}</span>`).join('')}

function barRow(label, val, base, color) {
  const pct = Math.min(val/base*100, 100);
  return `<div class="bar-row"><span class="bar-label">${label}</span><div class="bar-bg"><div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${color};">${pct.toFixed(1)}%</div></div><span class="bar-val">${fN(val)} vendas</span></div>`;
}

function bcCard(cls, head, val, pctOfSales, pctOfGroup, groupLabel, money) {
  return `<div class="breakdown-card ${cls}">
    <div class="bc-head">${head}</div>
    <div class="bc-val">${fN(val)}</div>
    <div class="bc-pct-main">${fP(pctOfSales)} das vendas</div>
    <div class="bc-pct-sub">${fP(pctOfGroup)} ${groupLabel}</div>
    <div class="bc-money">${money > 0 ? fDK(money) : '—'}</div>
  </div>`;
}

  <div class="breakdown-grid">
    ${bcCard('bc-total','Total',      rTotal,   rpct,                  d.refunds/d.total*100,        'das vendas', d.refund_value)}
    ${bcCard('bc-up',   '↑ Upsell',  d.ref_up, d.ref_up/d.total*100,  d.ref_up/rTotal*100,           'dos refunds',d.ref_up_val)}
    ${bcCard('bc-dw',   '↓ Downsell',d.ref_dw, d.ref_dw/d.total*100,  d.ref_dw/rTotal*100,           'dos refunds',d.ref_dw_val)}
    ${bcCard('bc-main', 'Front/Main', d.ref_main,d.ref_main/d.total*100,d.ref_main/rTotal*100,        'dos refunds',d.ref_main_val)}
  </div>
  <div class="sec-title">Chargebacks — geral e por tipo de oferta</div>
  <div class="breakdown-grid">
    ${bcCard('bc-total','Total',       cbTotal,   cpct,                           cbTotal/d.total*100,           'das vendas', 0)}
    ${bcCard('bc-up',   '↑ Upsell',   d.cb_up,   d.cb_up/d.total*100,            cbTotal>0?d.cb_up/cbTotal*100:0,  'dos CBs',d.cb_up_val)}
    ${bcCard('bc-dw',   '↓ Downsell', d.cb_dw,   d.cb_dw/d.total*100,            cbTotal>0?d.cb_dw/cbTotal*100:0,  'dos CBs',d.cb_dw_val)}
    ${bcCard('bc-main', 'Front/Main',  d.cb_main, d.cb_main/d.total*100,          cbTotal>0?d.cb_main/cbTotal*100:0,'dos CBs',d.cb_main_val)}
  </div>
  <div class="sec-title">Cobertura receita upsell vs. reembolso total</div>
  ${barRow('Up. receita',d.upsell_rev,  Math.max(d.upsell_rev,d.refund_value)*1.1,'#5aabff')}
  ${barRow('Reembolso',  d.refund_value,Math.max(d.upsell_rev,d.refund_value)*1.1,'#ff6060')}`;
}

function buildBgAll() {
  const rows=keys.map(k=>{
    const d=bgData[k]; const uOk=d.upsell_rev>d.refund_value; const cb=d.chargebacks;
    const rt=`<span style="color:var(--blue);font-weight:600;">${fN(d.ref_up)}</span> <span style="opacity:.5;">(${fP(d.ref_up/d.refunds*100)}) up</span><br><span style="color:var(--amber);font-weight:600;">${fN(d.ref_dw)}</span> <span style="opacity:.5;">(${fP(d.ref_dw/d.refunds*100)}) dw</span><br><span style="color:var(--green);font-weight:600;">${fN(d.ref_main)}</span> <span style="opacity:.5;">(${fP(d.ref_main/d.refunds*100)}) front</span>`;
    const ct=cb>0?`<span style="color:var(--blue);font-weight:600;">${fN(d.cb_up)}</span> <span style="opacity:.5;">(${fP(d.cb_up/cb*100)}) up</span><br><span style="color:var(--amber);font-weight:600;">${fN(d.cb_dw)}</span> <span style="opacity:.5;">(${fP(d.cb_dw/cb*100)}) dw</span><br><span style="color:var(--green);font-weight:600;">${fN(d.cb_main)}</span> <span style="opacity:.5;">(${fP(d.cb_main/cb*100)}) front</span>`:'—';
    return `<tr><td class="num">${d.label}</td><td class="num">${fN(d.total)}</td><td class="num info">${fN(d.upsells)} <span style="opacity:.45;font-size:10px;">(${fP(d.upsell_pct)})</span></td><td class="${pCls(d.refund_pct)}">${fN(d.refunds)} <span style="opacity:.5;font-size:10px;">(${fP(d.refund_pct)})</span></td><td style="font-size:11px;line-height:1.8;">${rt}</td><td class="${cb>60?'warn':'good'}">${fN(cb)}</td><td style="font-size:11px;line-height:1.8;">${ct}</td><td class="num info">${fDK(d.upsell_rev)}</td><td class="${uOk?'good':'warn'}">${fDK(d.refund_value)}</td></tr>`;
  }).join('');
  return `<div class="panel-header">Visão Geral <span class="tag tag-blue">Jan–Mai 2026</span></div>
  <div class="metrics-row">
    <div class="metric"><div class="metric-label">Total de vendas</div><div class="metric-val">${fN(keys.reduce((s,k)=>s+bgData[k].total,0))}</div></div>
    <div class="metric"><div class="metric-label">Total upsells</div><div class="metric-val info">${fN(keys.reduce((s,k)=>s+bgData[k].upsells,0))}</div></div>
    <div class="metric"><div class="metric-label">Total reembolsos</div><div class="metric-val amber">${fN(keys.reduce((s,k)=>s+bgData[k].refunds,0))}</div></div>
    <div class="metric"><div class="metric-label">Total chargebacks</div><div class="metric-val">${fN(keys.reduce((s,k)=>s+bgData[k].chargebacks,0))}</div></div>
  </div>
  <div class="insight">Taxa de reembolso ficou <strong>estável em ~11,5%</strong> de jan a abr. Maio (parcial, 8 dias) mostra 5,7% — esperado, pois a maioria dos reembolsos ainda não foi solicitada.</div>
  <div class="insight">Em <strong>jan e fev</strong> a receita de upsell era menor que o valor reembolsado. Inverteu em março e abril, com margem crescente.</div>
  <div class="insight"><strong>Abril</strong>: upsells dobraram (7,8% → 20,2%), receita upsell saltou de $259K para $522K, enquanto valor reembolsado cresceu apenas $7K.</div>
  <div class="sec-title">Comparativo mensal</div>
  <div class="table-wrap"><table><thead><tr><th>Mês</th><th>Vendas</th><th>Upsells</th><th>Reembolsos</th><th>Refund por tipo</th><th>Chargebacks</th><th>CB por tipo</th><th>Receita Up.</th><th>Reemb. ($)</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

keysEmp.forEach(k => { $('emp-'+k).innerHTML=buildEmpPanel(k); });
keys.forEach(k => { $('bg-'+k).innerHTML=buildBgPanel(k); $('int-'+k).innerHTML=buildIntPanel(k); });
$('emp-all').innerHTML=buildEmpAll();
$('bg-all').innerHTML=buildBgAll();
$('int-all').innerHTML=buildIntAll();

function switchMain(btn,tab) {
  document.querySelectorAll('.main-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));
  $('main-'+tab).classList.add('active'); btn.classList.add('active');
}
function switchSub(btn,prefix,key) {
  const panel=$('main-'+prefix);
  panel.querySelectorAll('.sub-panel').forEach(p=>p.classList.remove('active'));
  panel.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));
  const idMap = {empresa:'emp-', buygoods:'bg-', intervalo:'int-'};
  $((idMap[prefix]||prefix+'-')+key).classList.add('active');
  btn.classList.add('active');
}

function toggleTheme() {
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  $('themeBtn').textContent=isDark?'🌙':'☀';
  updateChartColors();
}

/* CHARTS */
const months=['Jan','Fev','Mar','Abr','Mai ∂'];
const monthsEmp=['Jan','Fev','Mar','Abr','Mai ∂'];
const getTick=()=>getComputedStyle(document.documentElement).getPropertyValue('--tick').trim();
const getGrid=()=>getComputedStyle(document.documentElement).getPropertyValue('--grid').trim();
const charts={};
const noLeg={plugins:{legend:{display:false}},responsive:true,maintainAspectRatio:false};

function scales(yfmt) {
  return {
    x:{grid:{display:false},ticks:{color:getTick(),font:{family:"'IBM Plex Mono'",size:11}}},
    y:{grid:{color:getGrid()},ticks:{color:getTick(),font:{family:"'IBM Plex Mono'",size:11},callback:yfmt}}
  };
}
function mk(id,cfg) { charts[id]=new Chart($(id),cfg); }
function leg(id,pairs) { $(id).innerHTML=pairs.map(([c,l,b])=>`<span class="legend-item"><span class="legend-dot" style="background:${c};${b?'border:1px solid '+b:''};"></span>${l}</span>`).join(''); }

mk('ec1',{type:'bar',data:{labels:monthsEmp,datasets:[{label:'Front',data:keysEmp.map(k=>empData[k].front_sales),backgroundColor:'#5aabff',borderRadius:4},{label:'Back',data:keysEmp.map(k=>empData[k].back_sales),backgroundColor:'#3dd68c',borderRadius:4}]},options:{...noLeg,scales:scales(v=>fN(v))}});
leg('ec1-leg',[['#5aabff','Front (vendas)'],['#3dd68c','Back — up+dw']]);

mk('ec2',{type:'bar',data:{labels:monthsEmp,datasets:[{label:'Net Profit',data:keysEmp.map(k=>Math.round(empData[k].net_profit)),backgroundColor:'#3dd68c',borderRadius:4},{label:'Refunds',data:keysEmp.map(k=>Math.round(empData[k].refunds)),backgroundColor:'#ff6060',borderRadius:4},{label:'CBs',data:keysEmp.map(k=>Math.round(empData[k].chargebacks)),backgroundColor:'#f5a623',borderRadius:4}]},options:{...noLeg,scales:scales(v=>'$'+(v/1000).toFixed(0)+'K')}});
leg('ec2-leg',[['#3dd68c','Net Profit'],['#ff6060','Refunds'],['#f5a623','Chargebacks']]);

mk('ec3',{type:'line',data:{labels:monthsEmp,datasets:[{data:keysEmp.map(k=>parseFloat(refPct(empData[k]).toFixed(2))),borderColor:'#ff6060',backgroundColor:'rgba(255,96,96,0.08)',fill:true,tension:0.35,pointRadius:5,pointBackgroundColor:'#ff6060'},{data:keysEmp.map(k=>parseFloat(cbPct(empData[k]).toFixed(2))),borderColor:'#f5a623',backgroundColor:'rgba(245,166,35,0.07)',fill:true,tension:0.35,pointRadius:5,pointBackgroundColor:'#f5a623',borderDash:[5,4]}]},options:{...noLeg,scales:scales(v=>v+'%')}});
leg('ec3-leg',[['#ff6060','Refund % do faturamento'],['#f5a623','Chargeback %']]);

mk('bc1',{type:'bar',data:{labels:months,datasets:[{data:keys.map(k=>bgData[k].total),backgroundColor:'rgba(90,171,255,0.22)',borderColor:'#5aabff',borderWidth:1,borderRadius:4},{data:keys.map(k=>bgData[k].upsells),backgroundColor:'#5aabff',borderRadius:4}]},options:{...noLeg,scales:scales(v=>fN(v))}});
leg('bc1-leg',[['rgba(90,171,255,0.5)','Total vendas',,'#5aabff'],['#5aabff','Upsells']]);

mk('bc2',{type:'bar',data:{labels:months,datasets:[{data:keys.map(k=>bgData[k].upsell_rev),backgroundColor:'#5aabff',borderRadius:4},{data:keys.map(k=>bgData[k].refund_value),backgroundColor:'rgba(255,96,96,0.28)',borderColor:'#ff6060',borderWidth:1,borderRadius:4}]},options:{...noLeg,scales:scales(v=>'$'+(v/1000).toFixed(0)+'K')}});
leg('bc2-leg',[['#5aabff','Receita upsell'],['rgba(255,96,96,0.5)','Valor reembolsado','#ff6060']]);

mk('bc3',{type:'line',data:{labels:months,datasets:[{data:keys.map(k=>bgData[k].upsell_pct),borderColor:'#5aabff',backgroundColor:'rgba(90,171,255,0.09)',fill:true,tension:0.35,pointRadius:5,pointBackgroundColor:'#5aabff'},{data:keys.map(k=>bgData[k].refund_pct),borderColor:'#ff6060',backgroundColor:'rgba(255,96,96,0.06)',fill:true,tension:0.35,pointRadius:5,pointBackgroundColor:'#ff6060',borderDash:[5,4]},{data:keys.map(k=>parseFloat((bgData[k].chargebacks/bgData[k].total*100).toFixed(2))),borderColor:'#f5a623',tension:0.35,pointRadius:4,pointBackgroundColor:'#f5a623',borderDash:[2,4]}]},options:{...noLeg,scales:scales(v=>v.toFixed(1)+'%')}});
leg('bc3-leg',[['#5aabff','% upsell'],['#ff6060','% reembolso'],['#f5a623','% chargeback']]);

function updateChartColors() {
  const tick=getTick(), grid=getGrid();
  Object.values(charts).forEach(c=>{
    c.options.scales.x.ticks.color=tick;
    c.options.scales.y.ticks.color=tick;
    c.options.scales.y.grid.color=grid;
    c.update();
  });
}
</script>
</body>
</html>
