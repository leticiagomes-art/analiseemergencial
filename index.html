<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Consolidado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── TOKENS ── */
[data-theme="dark"] {
  --bg:      #07070f;  --bg1: #0d0d1a;  --bg2: #111120;  --bg3: #181828;
  --border:  rgba(255,255,255,0.055);  --border2: rgba(255,255,255,0.11);
  --text:    #e6e6f2;  --text2: #72729a;  --text3: #3e3e5a;
  --blue:    #4f8cff;  --blue-d:  rgba(79,140,255,0.12);
  --green:   #34c97c;  --green-d: rgba(52,201,124,0.10);
  --red:     #f05252;  --red-d:   rgba(240,82,82,0.10);
  --amber:   #f0a020;  --amber-d: rgba(240,160,32,0.10);
  --shadow:  0 1px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  --grid: rgba(255,255,255,0.035);  --tick: #3e3e5a;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
  --display: 'Nunito', sans-serif;
}
[data-theme="light"] {
  --bg:      #f1f1f7;  --bg1: #ffffff;  --bg2: #f8f8fc;  --bg3: #ebebf3;
  --border:  rgba(0,0,0,0.07);  --border2: rgba(0,0,0,0.13);
  --text:    #0c0c1e;  --text2: #44446a;  --text3: #8888b0;
  --blue:    #1a6ef5;  --blue-d:  rgba(26,110,245,0.09);
  --green:   #13885a;  --green-d: rgba(19,136,90,0.09);
  --red:     #cc2e2e;  --red-d:   rgba(204,46,46,0.09);
  --amber:   #b86800;  --amber-d: rgba(184,104,0,0.09);
  --shadow:  0 1px 8px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
  --grid: rgba(0,0,0,0.05);  --tick: #8888b0;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
  --display: 'Nunito', sans-serif;
}

body {
  background: var(--bg); font-family: var(--sans); color: var(--text);
  min-height: 100vh; font-size: 14px; -webkit-font-smoothing: antialiased;
  transition: background .3s, color .3s;
}

.header {
  border-bottom: 1px solid var(--border); padding: 16px 28px 0;
  background: var(--bg1); position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow); transition: background .3s;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.logo { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--text3); }
.header-right { display: flex; align-items: center; gap: 8px; }
.date-badge { font-family: var(--mono); font-size: 10px; color: var(--text3); background: var(--bg3); border: 1px solid var(--border2); border-radius: 3px; padding: 3px 9px; letter-spacing: .04em; }
.theme-btn { background: var(--bg3); border: 1px solid var(--border2); border-radius: 4px; padding: 4px 9px; cursor: pointer; font-size: 14px; line-height: 1; color: var(--text3); transition: all .15s; }
.theme-btn:hover { border-color: var(--blue); color: var(--blue); }

.main-tabs { display: flex; gap: 2px; }
.main-tab {
  font-family: var(--sans); font-size: 12px; font-weight: 500; letter-spacing: .01em;
  padding: 10px 20px 12px; cursor: pointer; border: none; background: transparent;
  color: var(--text3); position: relative; transition: color .15s;
}
.main-tab::after {
  content: ''; position: absolute; bottom: 0; left: 10px; right: 10px; height: 1.5px;
  background: transparent; transition: background .15s;
}
.main-tab.active { color: var(--text); }
.main-tab.active::after { background: var(--blue); }
.main-tab:hover:not(.active) { color: var(--text2); }

.content { padding: 24px 28px 48px; }
.main-panel { display: none; }
.main-panel.active { display: block; }

.sub-tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 24px; }
.sub-btn {
  font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: .07em;
  text-transform: uppercase; padding: 5px 14px; border: 1px solid var(--border);
  border-radius: 3px; background: transparent; color: var(--text3); cursor: pointer; transition: all .15s;
}
.sub-btn.active { background: var(--blue-d); border-color: var(--blue); color: var(--blue); }
.sub-btn:hover:not(.active) { border-color: var(--border2); color: var(--text2); }

.sub-panel { display: none; }
.sub-panel.active { display: block; animation: fadeUp .2s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

.panel-header {
  font-family: var(--display); font-size: 22px; font-weight: 700; letter-spacing: -.02em;
  line-height: 1.15; color: var(--text); margin-bottom: 20px;
  display: flex; align-items: center; gap: 10px;
}

.metrics-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(148px, 1fr)); gap: 8px; margin-bottom: 10px; }
.metric {
  background: var(--bg1); border: 1px solid var(--border); border-radius: 6px;
  padding: 13px 15px; transition: border-color .15s, background .3s; position: relative; overflow: hidden;
}
.metric::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--border2), transparent); }
.metric:hover { border-color: var(--border2); }
.metric-label { font-family: var(--mono); font-size: 9.5px; font-weight: 500; letter-spacing: .09em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
.metric-val { font-family: var(--display); font-size: 21px; font-weight: 700; letter-spacing: -.03em; color: var(--text); line-height: 1; }
.metric-sub { font-family: var(--mono); font-size: 9.5px; color: var(--text3); margin-top: 5px; letter-spacing: .02em; }
.metric-val.good  { color: var(--green); }
.metric-val.warn  { color: var(--red); }
.metric-val.info  { color: var(--blue); }
.metric-val.amber { color: var(--amber); }

.sec-title {
  font-family: var(--mono); font-size: 9.5px; font-weight: 600; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text3); margin: 24px 0 12px;
  display: flex; align-items: center; gap: 8px;
}
.sec-title::before { content: ''; display: block; width: 2px; height: 10px; background: var(--blue); border-radius: 1px; flex-shrink: 0; }

.breakdown-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(148px, 1fr)); gap: 7px; margin-bottom: 4px; }
.breakdown-card {
  background: var(--bg1); border: 1px solid var(--border); border-radius: 6px;
  padding: 12px 14px; border-left: 2px solid var(--border2); transition: background .3s, border-color .15s;
}
.breakdown-card:hover { border-color: var(--border2); }
.bc-total { border-left-color: var(--text3); }
.bc-up    { border-left-color: var(--blue); }
.bc-dw    { border-left-color: var(--amber); }
.bc-main  { border-left-color: var(--green); }
.bc-head { font-family: var(--mono); font-size: 9.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
.bc-val { font-family: var(--display); font-size: 26px; font-weight: 700; letter-spacing: -.04em; color: var(--text); line-height: 1; margin-bottom: 5px; }
.bc-pct-main { font-family: var(--display); font-size: 12px; font-weight: 600; letter-spacing: -.01em; margin-bottom: 1px; }
.bc-pct-sub { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-bottom: 4px; letter-spacing: .02em; }
.bc-money { font-family: var(--mono); font-size: 10px; font-weight: 500; color: var(--text2); }
.bc-total .bc-pct-main { color: var(--text2); }
.bc-up    .bc-pct-main { color: var(--blue); }
.bc-dw    .bc-pct-main { color: var(--amber); }
.bc-main  .bc-pct-main { color: var(--green); }

.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-label { font-family: var(--mono); font-size: 10px; font-weight: 500; color: var(--text2); min-width: 44px; text-align: right; letter-spacing: .02em; }
.bar-bg { flex: 1; background: var(--bg3); border-radius: 2px; height: 20px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; display: flex; align-items: center; justify-content: flex-end; padding-right: 7px; font-family: var(--mono); font-size: 10px; font-weight: 600; color: #fff; transition: width .5s cubic-bezier(.25,.46,.45,.94); letter-spacing: .02em; }
.bar-val { font-family: var(--mono); font-size: 10px; color: var(--text3); min-width: 80px; }

.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 6px; margin-top: 6px; }
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--border2); }
th { padding: 9px 13px; text-align: left; white-space: nowrap; font-family: var(--mono); font-size: 9.5px; font-weight: 600; letter-spacing: .09em; text-transform: uppercase; color: var(--text3); }
td { padding: 9px 13px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 11.5px; color: var(--text2); transition: background .12s; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }
td.num   { color: var(--text); font-weight: 600; }
td.good  { color: var(--green); font-weight: 600; }
td.warn  { color: var(--red); font-weight: 600; }
td.amber { color: var(--amber); font-weight: 600; }
td.info  { color: var(--blue); font-weight: 600; }

.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
@media (max-width: 680px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-card, .chart-full { background: var(--bg1); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; transition: background .3s; }
.chart-full { margin-top: 12px; }
.chart-title { font-family: var(--mono); font-size: 9.5px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--text3); }
.legend-dot { width: 7px; height: 7px; border-radius: 1px; flex-shrink: 0; }

.tag { display: inline-block; font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; }
.tag-blue  { background: var(--blue-d);  color: var(--blue); }
.tag-amber { background: var(--amber-d); color: var(--amber); }
.tag-green { background: var(--green-d); color: var(--green); }

.insight {
  background: var(--bg2); border: 1px solid var(--border);
  border-left: 2px solid var(--blue); border-radius: 0 6px 6px 0;
  padding: 11px 14px; margin-bottom: 8px;
  font-family: var(--sans); font-size: 12.5px; color: var(--text2); line-height: 1.65; transition: background .3s;
}
.insight strong { color: var(--text); font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="logo">Dashboard Consolidado</span>
    <div class="header-right">
      <span class="date-badge">Jan–Mai 2026</span>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀</button>
    </div>
  </div>
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMain(this,'empresa')">Dashboard da Empresa</button>
    <button class="main-tab" onclick="switchMain(this,'buygoods')">BuyGoods — 4 Meses</button>
    <button class="main-tab" onclick="switchMain(this,'intervalo')">Intervalo do Pedido</button>
    <button class="main-tab" onclick="switchMain(this,'produtos')">Produtos</button>
    <button class="main-tab" onclick="switchMain(this,'upsell')">Análise de Upsell</button>
  </div>
</div>

<div class="content">

<div id="main-empresa" class="main-panel active">
  <div class="sub-tabs">
    <button class="sub-btn active" onclick="switchSub(this,'empresa','jan')">Janeiro</button>
    <button class="sub-btn" onclick="switchSub(this,'empresa','fev')">Fevereiro</button>
    <button class="sub-btn" onclick="switchSub(this,'empresa','mar')">Março</button>
    <button class="sub-btn" onclick="switchSub(this,'empresa','abr')">Abril</button>
    <button class="sub-btn" onclick="switchSub(this,'empresa','mai')">Maio ∂</button>
    <button class="sub-btn" onclick="switchSub(this,'empresa','all')">Visão Geral</button>
  </div>
  <div id="emp-jan" class="sub-panel active"></div>
  <div id="emp-fev" class="sub-panel"></div>
  <div id="emp-mar" class="sub-panel"></div>
  <div id="emp-abr" class="sub-panel"></div>
  <div id="emp-mai" class="sub-panel"></div>
  <div id="emp-all" class="sub-panel"></div>
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Vendas Front vs. Back por mês</div>
      <div style="position:relative;height:200px;"><canvas id="ec1" role="img" aria-label="Vendas front e back por mês"></canvas></div>
      <div class="legend" id="ec1-leg"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Net Profit vs. Refunds vs. Chargebacks ($)</div>
      <div style="position:relative;height:200px;"><canvas id="ec2" role="img" aria-label="Net profit, refunds e chargebacks por mês"></canvas></div>
      <div class="legend" id="ec2-leg"></div>
    </div>
  </div>
  <div class="chart-full">
    <div class="chart-title">Taxas de Refund & Chargeback (% do faturamento)</div>
    <div style="position:relative;height:200px;"><canvas id="ec3" role="img" aria-label="Taxas de refund e chargeback em porcentagem"></canvas></div>
    <div class="legend" id="ec3-leg"></div>
  </div>
</div>

<div id="main-buygoods" class="main-panel">
  <div class="sub-tabs">
    <button class="sub-btn active" onclick="switchSub(this,'buygoods','jan')">Janeiro</button>
    <button class="sub-btn" onclick="switchSub(this,'buygoods','fev')">Fevereiro</button>
    <button class="sub-btn" onclick="switchSub(this,'buygoods','mar')">Março</button>
    <button class="sub-btn" onclick="switchSub(this,'buygoods','abr')">Abril</button>
    <button class="sub-btn" onclick="switchSub(this,'buygoods','mai')">Maio ∂</button>
    <button class="sub-btn" onclick="switchSub(this,'buygoods','all')">Visão Geral</button>
  </div>
  <div id="bg-jan" class="sub-panel active"></div>
  <div id="bg-fev" class="sub-panel"></div>
  <div id="bg-mar" class="sub-panel"></div>
  <div id="bg-abr" class="sub-panel"></div>
  <div id="bg-mai" class="sub-panel"></div>
  <div id="bg-all" class="sub-panel"></div>
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Total de vendas & upsells por mês</div>
      <div style="position:relative;height:200px;"><canvas id="bc1" role="img" aria-label="Total de vendas e upsells"></canvas></div>
      <div class="legend" id="bc1-leg"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Receita upsell vs. valor reembolsado ($)</div>
      <div style="position:relative;height:200px;"><canvas id="bc2" role="img" aria-label="Receita de upsell vs valor reembolsado"></canvas></div>
      <div class="legend" id="bc2-leg"></div>
    </div>
  </div>
  <div class="chart-full">
    <div class="chart-title">% Upsell e % Reembolso sobre total de vendas</div>
    <div style="position:relative;height:200px;"><canvas id="bc3" role="img" aria-label="Porcentagem de upsell e reembolso"></canvas></div>
    <div class="legend" id="bc3-leg"></div>
  </div>
</div>

<div id="main-intervalo" class="main-panel">
  <div class="sub-tabs">
    <button class="sub-btn active" onclick="switchSub(this,'intervalo','jan')">Janeiro</button>
    <button class="sub-btn" onclick="switchSub(this,'intervalo','fev')">Fevereiro</button>
    <button class="sub-btn" onclick="switchSub(this,'intervalo','mar')">Março</button>
    <button class="sub-btn" onclick="switchSub(this,'intervalo','abr')">Abril</button>
    <button class="sub-btn" onclick="switchSub(this,'intervalo','mai')">Maio ∂</button>
    <button class="sub-btn" onclick="switchSub(this,'intervalo','all')">Visão Geral</button>
  </div>
  <div id="int-jan" class="sub-panel active"></div>
  <div id="int-fev" class="sub-panel"></div>
  <div id="int-mar" class="sub-panel"></div>
  <div id="int-abr" class="sub-panel"></div>
  <div id="int-mai" class="sub-panel"></div>
  <div id="int-all" class="sub-panel"></div>
</div>

<div id="main-upsell" class="main-panel">
  <div id="upsell-content"></div>
</div>

<div id="main-produtos" class="main-panel">
  <div class="sub-tabs">
    <button class="sub-btn active" onclick="switchProdMonth('all')">Geral</button>
    <button class="sub-btn" onclick="switchProdMonth('2025-12')">Dezembro</button>
    <button class="sub-btn" onclick="switchProdMonth('2026-01')">Janeiro</button>
    <button class="sub-btn" onclick="switchProdMonth('2026-02')">Fevereiro</button>
    <button class="sub-btn" onclick="switchProdMonth('2026-03')">Março</button>
    <button class="sub-btn" onclick="switchProdMonth('2026-04')">Abril</button>
    <button class="sub-btn" onclick="switchProdMonth('2026-05')">Maio</button>
  </div>
  <div id="prod-content"></div>
</div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

const BUCKETS   = ['0-3d','4-7d','8-15d','16-30d','45d+'];
const BKT_LABEL = {'0-3d':'0–3 dias','4-7d':'4–7 dias','8-15d':'8–15 dias','16-30d':'16–30 dias','45d+':'45+ dias'};
const BKT_COLOR = {'0-3d':'#3dd68c','4-7d':'#5aabff','8-15d':'#a78bfa','16-30d':'#f5a623','45d+':'#ff6060'};
const OT_COLOR  = {upsell:'#5aabff', downsell:'#f5a623', main:'#3dd68c'};
const OT_LABEL  = {upsell:'↑ Upsell', downsell:'↓ Downsell', main:'Front/Main'};

function sumBuckets(obj) { return BUCKETS.reduce((s,b)=>s+(obj[b]||0),0); }

function stackedBarHTML(offerType, data, total) {
  const rowTotal = sumBuckets(data);
  if (rowTotal === 0) return '';
  const bars = BUCKETS.map(b => {
    const v = data[b]||0; if (!v) return '';
    const w = (v/Math.max(total,1)*100).toFixed(1);
    const pct = (v/rowTotal*100).toFixed(0);
    return `<div title="${BKT_LABEL[b]}: ${v} (${pct}% deste tipo)" style="width:${w}%;background:${BKT_COLOR[b]};height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;min-width:${w>4?'0':'0'}px;">${w>5?v:''}</div>`;
  }).join('');
  return `<div style="margin-bottom:10px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
      <span style="min-width:90px;font-family:var(--mono);font-size:11px;font-weight:600;color:${OT_COLOR[offerType]};">${OT_LABEL[offerType]}</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--text3);">${rowTotal} ocorrências</span>
    </div>
    <div style="display:flex;height:26px;border-radius:5px;overflow:hidden;background:var(--bg3);">${bars}</div>
    <div style="display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;">
      ${BUCKETS.map(b=>{const v=data[b]||0; const p=(v/rowTotal*100).toFixed(0); return v>0?`<span style="font-family:var(--mono);font-size:10px;color:var(--text3);"><span style="display:inline-block;width:7px;height:7px;background:${BKT_COLOR[b]};border-radius:1px;margin-right:3px;vertical-align:middle;"></span>${BKT_LABEL[b]}: <strong style="color:var(--text2);">${v}</strong> <span style="opacity:.6;">(${p}%)</span></span>`:''}).join('')}
    </div>
  </div>`;
}

function buildIntPanel(key) {

function updateChartColors() {
  const tick=getTick(), grid=getGrid();
  Object.values(charts).forEach(c=>{
    c.options.scales.x.ticks.color=tick;
    c.options.scales.y.ticks.color=tick;
    c.options.scales.y.grid.color=grid;
    c.update();
  });
}

/* ── PRODUCT RENDER ── */
function typeTag(byType) {
  const tags = [];
  if ((byType.upsell   || 0) > 0) tags.push(`<span class="prod-type-pill pill-up">↑ up: ${byType.upsell}</span>`);
  if ((byType.downsell || 0) > 0) tags.push(`<span class="prod-type-pill pill-dw">↓ dw: ${byType.downsell}</span>`);
  if ((byType.main     || 0) > 0) tags.push(`<span class="prod-type-pill pill-main">front: ${byType.main}</span>`);
  return tags.length ? `<div class="prod-type-pills">${tags.join('')}</div>` : '';
}

function bucketBar(buckets, total, color) {
  if (!buckets || total === 0) return '';
  const bars = PBKTS.map(b => {
    const v = buckets[b] || 0; if (!v) return '';
    const w = (v/total*100).toFixed(1);
    return `<div title="${PBKT_LABEL[b]}: ${v} (${(v/total*100).toFixed(0)}%)" style="width:${w}%;background:${PBKT_COLOR[b]};height:100%;min-width:2px;"></div>`;
  }).join('');
  const legend = PBKTS.filter(b => (buckets[b]||0) > 0).map(b =>
    `<span style="font-family:var(--mono);font-size:9px;color:var(--text3);white-space:nowrap;">
      <span style="display:inline-block;width:6px;height:6px;background:${PBKT_COLOR[b]};border-radius:1px;margin-right:2px;vertical-align:middle;"></span>${PBKT_LABEL[b]}: <strong style="color:var(--text2);">${buckets[b]}</strong> (${(buckets[b]/total*100).toFixed(0)}%)
    </span>`).join('');
  return `<div style="margin-top:8px;">
    <div style="display:flex;height:12px;border-radius:3px;overflow:hidden;background:var(--bg3);">${bars}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">${legend}</div>
  </div>`;
}

function prodSectionHTML(title, data, color) {
  const hasData = data.total > 0;
  if (!hasData) return `<div class="prod-section">
    <div class="prod-sec-title"><span style="width:6px;height:6px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0;"></span>${title}</div>
    <div class="prod-no-data">Sem registros no período</div>
  </div>`;
  const reasons = (data.reasons||[]).slice(0,8);
  return `<div class="prod-section">
    <div class="prod-sec-title"><span style="width:6px;height:6px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0;"></span>${title}</div>
    <div class="prod-stat-row">
      <div class="prod-stat"><div class="prod-stat-v" style="color:${color};">${data.total}</div><div class="prod-stat-l">ocorrências</div></div>
      <div class="prod-stat"><div class="prod-stat-v" style="color:${color};">$${data.value.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div><div class="prod-stat-l">valor total</div></div>
    </div>
    ${typeTag(data.byType)}
    ${bucketBar(data.buckets, data.total, color)}
    <div class="prod-reasons" style="margin-top:8px;">
      ${reasons.map(({n,r})=>`<div class="prod-reason"><span class="prod-reason-n" style="color:${color};">${n}×</span><span>${r}</span></div>`).join('')}
    </div>
  </div>`;
}

function buildProdCard(p, filter) {
  const hasRef = p.refunds.total > 0;
  const hasCB  = p.chargebacks.total > 0;
  if (filter === 'refund'     && !hasRef) return '';
  if (filter === 'chargeback' && !hasCB)  return '';
  return `<div class="prod-card">
    <div class="prod-header">
      <div>
        <div class="prod-name" style="border-left:3px solid ${p.color};padding-left:10px;">${p.name}</div>
        <div class="prod-range">📅 Ref: ${p.refRange}</div>
        ${p.cbRange && p.cbRange!=='—' ? `<div class="prod-range">📅 CB: ${p.cbRange}</div>` : ''}
      </div>
      <div style="text-align:right;flex-shrink:0;">
        ${hasRef ? `<div style="font-family:var(--mono);font-size:12px;color:var(--red);font-weight:700;">${p.refunds.total} refunds</div>` : ''}
        ${hasCB  ? `<div style="font-family:var(--mono);font-size:12px;color:var(--amber);font-weight:700;">${p.chargebacks.total} CBs</div>` : ''}
      </div>
    </div>
    <div class="prod-body">
      ${prodSectionHTML('Reembolsos',  p.refunds,     'var(--red)')}
      <div style="height:1px;background:var(--border);margin:12px 0;"></div>
      ${prodSectionHTML('Chargebacks', p.chargebacks, 'var(--amber)')}
    </div>
  </div>`;
}

function buildProdContent(filter, month) {
  currentProdFilter = filter || 'all';
  const totalRef    = prodData.reduce((s,p)=>s+p.refunds.total,0);
  const totalCB     = prodData.reduce((s,p)=>s+p.chargebacks.total,0);
  const totalRefVal = prodData.reduce((s,p)=>s+p.refunds.value,0);
  const totalCBVal  = prodData.reduce((s,p)=>s+p.chargebacks.value,0);
  const cards = prodData.map(p=>buildProdCard(p,filter)).filter(Boolean).join('');

  const refReasons = {}, cbReasons = {};
  prodData.forEach(p => {
    (p.refunds.reasons||[]).forEach(({n,r})=>{ refReasons[r]=(refReasons[r]||0)+n; });
    (p.chargebacks.reasons||[]).forEach(({n,r})=>{ cbReasons[r]=(cbReasons[r]||0)+n; });
  });
  const topRef = Object.entries(refReasons).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const topCB  = Object.entries(cbReasons).sort((a,b)=>b[1]-a[1]).slice(0,8);

  // Aggregate buckets across all products
  const allRefBkts={}, allCBBkts={};
  PBKTS.forEach(b=>{ allRefBkts[b]=prodData.reduce((s,p)=>s+(p.refunds.buckets && p.refunds.buckets[b]||0),0); });
  PBKTS.forEach(b=>{ allCBBkts[b]=prodData.reduce((s,p)=>s+(p.chargebacks.buckets && p.chargebacks.buckets[b]||0),0); });

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
    <div class="panel-header" style="margin-bottom:0;">Análise por Produto <span class="tag tag-blue">Últimos 6 Meses</span></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:20px;">
    <div class="metric"><div class="metric-label">Total refunds</div><div class="metric-val warn">${totalRef.toLocaleString('pt-BR')}</div><div class="metric-sub">$${(totalRefVal/1000).toFixed(1)}K</div></div>
    <div class="metric"><div class="metric-label">Total chargebacks</div><div class="metric-val amber">${totalCB.toLocaleString('pt-BR')}</div><div class="metric-sub">$${(totalCBVal/1000).toFixed(1)}K</div></div>
    <div class="metric"><div class="metric-label">Produto + refunds</div><div class="metric-val info">${prodData.reduce((a,b)=>b.refunds.total>a.refunds.total?b:a).name}</div><div class="metric-sub">${prodData.reduce((a,b)=>b.refunds.total>a.refunds.total?b:a).refunds.total} registros</div></div>
    <div class="metric"><div class="metric-label">Produto + CBs</div><div class="metric-val amber">${prodData.reduce((a,b)=>b.chargebacks.total>a.chargebacks.total?b:a).name}</div><div class="metric-sub">${prodData.reduce((a,b)=>b.chargebacks.total>a.chargebacks.total?b:a).chargebacks.total} registros</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
    <div style="background:var(--bg1);border:1px solid var(--border);border-top:3px solid var(--red);border-radius:5px;padding:14px 18px;">
      <div class="sec-title" style="margin-top:0;border-left-color:var(--red);">Top motivações de reembolso (todos os produtos)</div>
      <div class="prod-reasons">${topRef.map(([r,n])=>`<div class="prod-reason"><span class="prod-reason-n" style="color:var(--red);">${n}×</span><span>${r}</span></div>`).join('')}</div>
      <div style="margin-top:12px;"><div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">Intervalo de reembolso (todos)</div>${bucketBar(allRefBkts,totalRef,'var(--red)')}</div>
    </div>
    <div style="background:var(--bg1);border:1px solid var(--border);border-top:3px solid var(--amber);border-radius:5px;padding:14px 18px;">
      <div class="sec-title" style="margin-top:0;border-left-color:var(--amber);">Top motivações de chargeback (todos os produtos)</div>
      <div class="prod-reasons">${topCB.map(([r,n])=>`<div class="prod-reason"><span class="prod-reason-n" style="color:var(--amber);">${n}×</span><span>${r}</span></div>`).join('')}</div>
      <div style="margin-top:12px;"><div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">Intervalo de chargeback (todos)</div>${bucketBar(allCBBkts,totalCB,'var(--amber)')}</div>
    </div>
  </div>

  <div class="prod-filter-bar">
    <button class="prod-filter-btn ${filter==='all'?'active':''}" onclick="rebuildProd('all')">Todos (${prodData.length})</button>
    <button class="prod-filter-btn ${filter==='refund'?'active':''}" onclick="rebuildProd('refund')">Com reembolsos (${prodData.filter(p=>p.refunds.total>0).length})</button>
    <button class="prod-filter-btn ${filter==='chargeback'?'active':''}" onclick="rebuildProd('chargeback')">Com chargebacks (${prodData.filter(p=>p.chargebacks.total>0).length})</button>
  </div>
  <div class="prod-grid">${cards}</div>`;
}

function rebuildProd(filter) {
  $('prod-content').innerHTML = buildProdContent(filter, currentProdMonth || 'all');
}

const MONTH_KEYS  = ['2025-12','2026-01','2026-02','2026-03','2026-04','2026-05'];
const MONTH_NAMES = {'2025-12':'Dezembro','2026-01':'Janeiro','2026-02':'Fevereiro','2026-03':'Março','2026-04':'Abril','2026-05':'Maio'};
let currentProdMonth = 'all';

function buildMonthMiniCard(prodName, month, type) {
  const data = prodMonthly[prodName];
  if (!data) return '';
  const m = (type==='ref' ? data.ref : data.cb)[month];
  if (!m || m.total === 0) return '';
  const color = type==='ref' ? 'var(--red)' : 'var(--amber)';
  const label = type==='ref' ? 'refs' : 'CBs';
  return `<div style="background:var(--bg3);border-radius:5px;padding:7px 10px;margin-bottom:6px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <span style="font-family:var(--mono);font-size:10px;font-weight:600;color:${color};">${m.total} ${label}</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--text3);">$${(m.value/1000).toFixed(1)}K</span>
    </div>
    ${typeTag({upsell:m.up||0,downsell:m.dw||0,main:m.main||0})}
    ${bucketBar(m.buckets, m.total, color)}
    <div class="prod-reasons" style="margin-top:6px;">
      ${(m.reasons||[]).slice(0,4).map(([n,r])=>`<div class="prod-reason"><span class="prod-reason-n" style="color:${color};">${n}×</span><span>${r}</span></div>`).join('')}
    </div>
  </div>`;
}

function buildMonthCard(month) {
  const cards = prodData.map(p => {
    const pName = p.name === 'Visium Pro' ? 'VisiumPro' : p.name;
    const refCard = buildMonthMiniCard(pName, month, 'ref');
    const cbCard  = buildMonthMiniCard(pName, month, 'cb');
    if (!refCard && !cbCard) return '';
    return `<div class="prod-card">
      <div class="prod-header">
        <div><div class="prod-name" style="border-left:3px solid ${p.color};padding-left:10px;">${p.name}</div></div>
        <div style="text-align:right;">
          ${prodMonthly[pName] && prodMonthly[pName].ref[month] ? `<div style="font-family:var(--mono);font-size:11px;color:var(--red);font-weight:700;">${(prodMonthly[pName].ref[month]||{total:0}).total} refs</div>` : ''}
          ${prodMonthly[pName] && prodMonthly[pName].cb[month]  ? `<div style="font-family:var(--mono);font-size:11px;color:var(--amber);font-weight:700;">${(prodMonthly[pName].cb[month]||{total:0}).total} CBs</div>` : ''}
        </div>
      </div>
      <div class="prod-body">
        ${refCard ? `<div class="prod-sec-title"><span style="width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block;flex-shrink:0;"></span>Reembolsos</div>${refCard}` : '<div class="prod-no-data">Sem reembolsos neste mês</div>'}
        <div style="height:1px;background:var(--border);margin:10px 0;"></div>
        ${cbCard  ? `<div class="prod-sec-title"><span style="width:6px;height:6px;border-radius:50%;background:var(--amber);display:inline-block;flex-shrink:0;"></span>Chargebacks</div>${cbCard}` : '<div class="prod-no-data">Sem chargebacks neste mês</div>'}
      </div>
    </div>`;
  }).filter(Boolean).join('');
  const totRef = prodData.reduce((s,p)=>{ const pn=p.name==='Visium Pro'?'VisiumPro':p.name; return s+((prodMonthly[pn]&&prodMonthly[pn].ref[month])?prodMonthly[pn].ref[month].total:0); },0);
  const totCB  = prodData.reduce((s,p)=>{ const pn=p.name==='Visium Pro'?'VisiumPro':p.name; return s+((prodMonthly[pn]&&prodMonthly[pn].cb[month])?prodMonthly[pn].cb[month].total:0); },0);
  return `<div style="margin-bottom:16px;"><div class="metrics-row">
    <div class="metric"><div class="metric-label">Refunds ${MONTH_NAMES[month]}</div><div class="metric-val warn">${totRef}</div></div>
    <div class="metric"><div class="metric-label">Chargebacks ${MONTH_NAMES[month]}</div><div class="metric-val amber">${totCB}</div></div>
  </div></div>
  <div class="prod-grid">${cards || '<div style="color:var(--text3);font-family:var(--mono);font-size:12px;">Sem dados para este mês.</div>'}</div>`;
}

function buildProdFull() { return buildProdContent(currentProdFilter||'all', 'all'); }

function switchProdMonth(month) {
  currentProdMonth = month;
  document.querySelectorAll('#main-produtos .sub-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  $('prod-content').innerHTML = month === 'all'
    ? buildProdContent(currentProdFilter||'all', 'all')
    : `<div class="panel-header">${MONTH_NAMES[month]} <span class="tag tag-blue">${month}</span></div>${buildMonthCard(month)}`;
}

    note:'Primeira vez que "Did not agree to the upsells" aparece como razão dominante. Sinal de que o crescimento do volume estava começando a gerar atrito mesmo no funil padrão.' },
  { key:'abr', label:'Abril',     funil:'Agressivo', color:'var(--amber)', dot:'#f0a020',
    gross:522684, refVal:113858, refs:492, sales:2292, total:11352, cbs:19,
    mainRefRate:8.5,  frontRef:746, frontSales:8816,
    topReason:'Did not agree to the upsells (dominante)',
    signal:'🟡', signalLabel:'Alerta crescendo',
    note:'Transição para funil agressivo: upsells quase dobram (13% → 20%). Net explode para $409K. A taxa de refund de upsell permanece estável em 21,5% — o funil funcionou em termos de lucro. Mas "Did not agree to the upsells" ultrapassa 100 ocorrências.' },
  { key:'mai', label:'Maio (1–17)',funil:'Agressivo', color:'var(--red)',   dot:'#f05252',
    gross:305595, refVal:107022, refs:357, sales:1304, total:5442, cbs:25,
    mainRefRate:19.5, frontRef:794, frontSales:4068,
    topReason:'Chargeback alert / Threatened with a chargeback',
    signal:'🔴', signalLabel:'Stress detectado',
    note:'Taxa de refund de upsell sobe para 27,4% (acima da faixa histórica 19–22%). "Threatened with a chargeback" entra como razão dominante — sinal de clientes indo direto ao banco antes do CS. CB de upsell sobe para 1,92%. Período parcial (17 dias), mas a trajetória é preocupante.' },
];

const upActions = [
  { status:'done',    label:'Welcome Experience',       desc:'Melhoria do onboarding pós-compra para reduzir arrependimento imediato' },
  { status:'done',    label:'Material Premium Gratuito', desc:'Conteúdo exclusivo entregue para reforçar o valor percebido da compra' },
  { status:'done',    label:'App de Acompanhamento',    desc:'Ferramenta de tracking para engajamento e percepção de progresso' },
  { status:'pending', label:'Sequência Pós-Upsell (D1/D3/D7)', desc:'Emails específicos para quem aceitou upsell, reforçando o ROI da decisão nos primeiros 7 dias — janela crítica de refund' },
  { status:'pending', label:'Timing do UP2+ (24–48h delay)', desc:'Apresentar UP2 e UP3 por email 24–48h após a compra ao invés de OTO imediato — reduz impulso de cancelamento' },
  { status:'pending', label:'Segmentação por Afiliado',  desc:'Afiliados de alto refund (Walife 16,5%, José Carlos 15%) recebem versão menos agressiva do funil ou pré-qualificação de tráfego' },
  { status:'pending', label:'CB Preemption Desk',        desc:'"Chargeback alert" como tag de refund = cliente foi ao banco antes do CS. Protocolo de resposta em 24h para reverter esses casos' },
  { status:'pending', label:'Review Gate Mensal',        desc:'Análise UP1 vs UP2 vs UP3 por produto mensalmente: cortar etapas de baixo ROI líquido e realocar para produtos com menor taxa de refund' },
  { status:'pending', label:'UP1 focado vs UP1 expandido', desc:'Em vez de escalar número de upsells, aumentar o ticket do UP1 e reduzir etapas — menos fricção, mesmo ou maior net revenue' },
];

function buildUpsellContent() {
  const totalGross = upData.reduce((s,d)=>s+d.gross,0);
  const totalRefVal= upData.reduce((s,d)=>s+d.refVal,0);
  const totalNet   = totalGross - totalRefVal;
  const avgRefRate = upData.reduce((s,d)=>s+(d.refs/d.sales*100),0) / upData.length;

  const fmtD  = v => '$' + v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
  const fmtDK = v => '$' + (v/1000).toFixed(0) + 'K';
  const fmtP  = v => v.toFixed(1) + '%';

  // Month cards
  const monthCards = upData.map(d => {
    const net = d.gross - d.refVal;
    const refRate = d.refs/d.sales*100;
    const cbRate  = d.cbs/d.sales*100;
    const netPct  = net/d.gross*100;
    const diff    = refRate - d.mainRefRate;
    return `<div style="background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:0;overflow:hidden;">
      <div style="padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-family:var(--display);font-size:15px;font-weight:700;letter-spacing:-.02em;color:var(--text);">${d.label}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.07em;">Funil ${d.funil}</div>
        </div>
        <div style="font-size:18px;" title="${d.signalLabel}">${d.signal}</div>
      </div>
      <div style="padding:12px 16px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;">
          <div style="background:var(--bg3);border-radius:4px;padding:8px 10px;">
            <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">Gross Up</div>
            <div style="font-family:var(--display);font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--blue);">${fmtDK(d.gross)}</div>
          </div>
          <div style="background:var(--bg3);border-radius:4px;padding:8px 10px;">
            <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">Net Up</div>
            <div style="font-family:var(--display);font-size:16px;font-weight:700;letter-spacing:-.02em;color:${netPct<65?'var(--red)':'var(--green)'};">${fmtDK(net)}</div>
          </div>
          <div style="background:var(--bg3);border-radius:4px;padding:8px 10px;">
            <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">Ref% Up</div>
            <div style="font-family:var(--display);font-size:16px;font-weight:700;letter-spacing:-.02em;color:${refRate>25?'var(--red)':refRate>22?'var(--amber)':'var(--text)'};">${fmtP(refRate)}</div>
          </div>
          <div style="background:var(--bg3);border-radius:4px;padding:8px 10px;">
            <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">vs Front</div>
            <div style="font-family:var(--display);font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--amber);">+${fmtP(diff)}</div>
          </div>
        </div>
        <div style="font-family:var(--mono);font-size:9.5px;color:var(--blue);margin-bottom:4px;letter-spacing:.02em;">↑ ${fN(d.sales)} upsells | ${fmtP(d.sales/d.total*100)} das vendas</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:8px;">CB up: ${d.cbs} (${fmtP(cbRate)})</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em;">Razão dominante</div>
        <div style="font-family:var(--sans);font-size:11.5px;color:var(--text2);line-height:1.5;">${d.topReason}</div>
      </div>
      <div style="background:var(--bg2);border-top:1px solid var(--border);padding:10px 16px;font-family:var(--sans);font-size:11px;color:var(--text2);line-height:1.55;">${d.note}</div>
    </div>`;
  }).join('');

  // Action matrix
  const actionRows = upActions.map(a => {
    const isDone = a.status === 'done';
    return `<div style="display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);">
      <div style="width:60px;flex-shrink:0;padding-top:1px;">
        ${isDone
          ? `<span style="font-family:var(--mono);font-size:9px;background:var(--green-d);color:var(--green);padding:2px 7px;border-radius:2px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;">Feito</span>`
          : `<span style="font-family:var(--mono);font-size:9px;background:var(--blue-d);color:var(--blue);padding:2px 7px;border-radius:2px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;">Sugerido</span>`}
      </div>
      <div style="flex:1;">
        <div style="font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:2px;">${a.label}</div>
        <div style="font-family:var(--sans);font-size:11.5px;color:var(--text2);line-height:1.5;">${a.desc}</div>
      </div>
    </div>`;
  }).join('');

  // Net upsell bar (visual breakdown)
  const grossPct = 100;
  const refPct2  = (totalRefVal/totalGross*100).toFixed(1);
  const netPct2  = (totalNet/totalGross*100).toFixed(1);

  return `
  <div class="panel-header">Análise de Upsell <span class="tag tag-blue">Jan–Mai 2026</span></div>

  <!-- VERDICT -->
  <div style="background:linear-gradient(135deg,var(--bg2) 0%,var(--bg1) 100%);border:1px solid var(--border2);border-left:3px solid var(--green);border-radius:0 6px 6px 0;padding:16px 20px;margin-bottom:20px;">
    <div style="font-family:var(--display);font-size:16px;font-weight:700;color:var(--green);margin-bottom:6px;">✓ Vale a pena manter — com ajustes</div>
    <div style="font-family:var(--sans);font-size:13px;color:var(--text2);line-height:1.7;">
      O upsell gerou <strong style="color:var(--text);">${fmtD(totalNet)}</strong> de receita líquida após descontar todos os reembolsos de upsell — uma margem de <strong style="color:var(--green);">75,6%</strong> sobre o gross.
      O problema não é o upsell em si, é a <strong style="color:var(--text);">fricção no momento da oferta e nos primeiros 7 dias pós-compra</strong>.
      A taxa de refund de upsell (19–27%) é estruturalmente 2× maior que o front — isso é esperado —
      mas o sinal de alerta em maio é o surgimento de <em>"Threatened with a chargeback"</em> como razão dominante,
      indicando clientes indo ao banco antes do CS. Esse é o ponto crítico de ação.
    </div>
  </div>

  <!-- KPI SUMMARY -->
  <div class="metrics-row" style="margin-bottom:20px;">
    <div class="metric"><div class="metric-label">Gross upsell acumulado</div><div class="metric-val info">${fmtDK(totalGross)}</div><div class="metric-sub">Jan–Mai 2026</div></div>
    <div class="metric"><div class="metric-label">Net upsell pós-refund</div><div class="metric-val good">${fmtDK(totalNet)}</div><div class="metric-sub">Margem: ${fmtP(totalNet/totalGross*100)}</div></div>
    <div class="metric"><div class="metric-label">Refunds de upsell</div><div class="metric-val warn">${fmtDK(totalRefVal)}</div><div class="metric-sub">${fmtP(totalRefVal/totalGross*100)} do gross</div></div>
    <div class="metric"><div class="metric-label">Taxa média de refund up</div><div class="metric-val amber">${fmtP(avgRefRate)}</div><div class="metric-sub">vs ~10% no front/main</div></div>
  </div>

  <!-- GROSS → NET BAR -->
  <div style="background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:16px 18px;margin-bottom:20px;">
    <div class="chart-title">Composição do gross upsell acumulado</div>
    <div style="display:flex;height:28px;border-radius:3px;overflow:hidden;margin-bottom:8px;">
      <div style="width:${netPct2}%;background:var(--green);display:flex;align-items:center;padding-left:10px;font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;">Net ${netPct2}%</div>
      <div style="width:${refPct2}%;background:var(--red);display:flex;align-items:center;padding-left:8px;font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;">Ref ${refPct2}%</div>
    </div>
    <div style="display:flex;gap:16px;font-family:var(--mono);font-size:10px;color:var(--text3);">
      <span><span style="display:inline-block;width:8px;height:8px;background:var(--green);border-radius:1px;margin-right:4px;vertical-align:middle;"></span>Net retido: ${fmtD(totalNet)}</span>
      <span><span style="display:inline-block;width:8px;height:8px;background:var(--red);border-radius:1px;margin-right:4px;vertical-align:middle;"></span>Refundado: ${fmtD(totalRefVal)}</span>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="charts-grid" style="margin-bottom:20px;">
    <div class="chart-card">
      <div class="chart-title">Receita upsell — gross vs net (por mês)</div>
      <div style="position:relative;height:200px;"><canvas id="up-chart1"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Taxa de refund: upsell vs front/main</div>
      <div style="position:relative;height:200px;"><canvas id="up-chart2"></canvas></div>
    </div>
  </div>

  <!-- MONTH BY MONTH -->
  <div class="sec-title">Evolução mês a mês</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:24px;">
    ${monthCards}
  </div>

  <!-- TABLE -->
  <div class="sec-title">Comparativo de lucratividade por mês</div>
  <div class="table-wrap" style="margin-bottom:24px;">
    <table>
      <thead><tr>
        <th>Mês</th><th>Funil</th><th>Upsells</th><th>Up%</th>
        <th>Gross Up</th><th>Refund Up</th><th>Net Up</th><th>Margem</th>
        <th>Ref% Up</th><th>Ref% Front</th><th>Δ</th>
      </tr></thead>
      <tbody>
        ${upData.map(d=>{
          const net=d.gross-d.refVal, refR=d.refs/d.sales*100, diff=refR-d.mainRefRate, margin=net/d.gross*100;
          return `<tr>
            <td class="num">${d.label}</td>
            <td style="color:${d.funil==='Agressivo'?'var(--amber)':'var(--text3)'};">${d.funil}</td>
            <td class="num info">${fN(d.sales)}</td>
            <td>${fmtP(d.sales/d.total*100)}</td>
            <td class="num info">${fmtDK(d.gross)}</td>
            <td class="warn">${fmtDK(d.refVal)}</td>
            <td class="${margin<65?'warn':'good'}">${fmtDK(net)}</td>
            <td class="${margin<65?'warn':margin<72?'amber':'good'}">${fmtP(margin)}</td>
            <td class="${refR>25?'warn':refR>22?'amber':'num'}">${fmtP(refR)}</td>
            <td>${fmtP(d.mainRefRate)}</td>
            <td class="amber">+${fmtP(diff)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>

  <!-- ACTION MATRIX -->
  <div class="sec-title">Plano de ação — o que foi feito e o que considerar</div>
  <div style="background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:0 18px 4px;">
    ${actionRows}
    <div style="height:1px;"></div>
  </div>

  <!-- AFFILIATES NOTE -->
  <div class="sec-title" style="margin-top:22px;">Afiliados — atenção aos maiores geradores de refund</div>
  <div class="insight">
    <strong>Walife Garcias (ID 379)</strong> — 16,5% de refund | <strong>José Carlos Santos (ID 1490)</strong> — 15,0% | <strong>Vanessa Bertoldo (ID 3294)</strong> — 15,2%.
    Estes três afiliados combinam alto volume com taxas de refund acima da média geral (~14%).
    Uma versão menos agressiva do funil (sem UP3+) ou critérios de qualificação de tráfego mais rígidos para esses IDs pode reduzir o refund total sem impactar o net de forma significativa — especialmente se o refund deles está concentrado nos primeiros 3 dias (arrependimento imediato).
  </div>
  <div class="insight">
    <strong>RAFAEL SANTOS (ID 382)</strong> — 5,1% de refund com $36K de faturamento — padrão de tráfego mais qualificado.
    Analisar de onde vem esse tráfego e replicar para outros afiliados pode ser tão eficaz quanto ajustar o funil.
  </div>`;
}


function switchMain(btn, tab) {
  document.querySelectorAll('.main-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));
  $('main-'+tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'produtos' && !$('prod-content').innerHTML) {
    $('prod-content').innerHTML = buildProdContent('all', 'all');
  }
  if (tab === 'upsell' && !$('upsell-content').innerHTML) {
    $('upsell-content').innerHTML = buildUpsellContent();
    setTimeout(initUpsellCharts, 50);
  }
}

function initUpsellCharts() {
  if (!$('up-chart1')) return;
  const uMonths = upData.map(d=>d.label.replace(' (1–17)',' ∂'));
  mk('up-chart1',{type:'bar',data:{labels:uMonths,datasets:[
    {label:'Gross',data:upData.map(d=>d.gross),backgroundColor:'rgba(79,140,255,0.22)',borderColor:'#4f8cff',borderWidth:1,borderRadius:3},
    {label:'Net', data:upData.map(d=>d.gross-d.refVal),backgroundColor:'#34c97c',borderRadius:3},
  ]},options:{...noLeg,scales:{x:{grid:{display:false},ticks:{color:getTick(),font:{family:'JetBrains Mono',size:10}}},y:{grid:{color:getGrid()},ticks:{color:getTick(),font:{family:'JetBrains Mono',size:10},callback:v=>'$'+(v/1000).toFixed(0)+'K'}}}}});

  mk('up-chart2',{type:'line',data:{labels:uMonths,datasets:[
    {label:'Ref% Up',data:upData.map(d=>parseFloat((d.refs/d.sales*100).toFixed(1))),borderColor:'#f05252',backgroundColor:'rgba(240,82,82,0.08)',fill:true,tension:0.35,pointRadius:5,pointBackgroundColor:'#f05252'},
    {label:'Ref% Front',data:upData.map(d=>d.mainRefRate),borderColor:'#4f8cff',backgroundColor:'rgba(79,140,255,0.06)',fill:true,tension:0.35,pointRadius:5,pointBackgroundColor:'#4f8cff',borderDash:[5,4]},
  ]},options:{...noLeg,scales:{x:{grid:{display:false},ticks:{color:getTick(),font:{family:'JetBrains Mono',size:10}}},y:{grid:{color:getGrid()},ticks:{color:getTick(),font:{family:'JetBrains Mono',size:10},callback:v=>v+'%'}}}}});
}

function switchSub(btn, prefix, key) {
  const panel = $('main-'+prefix);
  panel.querySelectorAll('.sub-panel').forEach(p=>p.classList.remove('active'));
  panel.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));
  const idMap = {empresa:'emp-', buygoods:'bg-', intervalo:'int-'};
  $((idMap[prefix]||prefix+'-')+key).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
